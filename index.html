<script type="text/babel">
function SetRow({setNum,prev,data,onUpdate,onComplete,isNext,canComplete,bodyweight}){
  const done=data.done;
  const prevWeight=prev
    ?((parseFloat(prev.weight)||0)>0?prev.weight:bodyweight?'BW':'—')
    :'—';
  return(
    <div className={'srow'+(done?' done':isNext?' active-row':'')}>
      <div className="snum">{setNum}</div>
      <div className="sprev">
        {prev
          ?<><div className="sprev-w">{prevWeight}</div><div className="sprev-r">x{prev.reps}</div></>
          :<div className="sprev-w" style={{fontSize:11}}>—</div>}
      </div>
      <input className={'sinput'+(isNext?' ai':'')} type="number" inputMode="decimal"
        value={data.weight} disabled={done}
        aria-label={`Set ${setNum} weight in pounds`}
        onChange={e=>onUpdate('weight',e.target.value)} placeholder={bodyweight?'BW+':'lbs'}/>
      <input className={'sinput'+(isNext?' ai':'')} type="number" inputMode="numeric"
        value={data.reps} disabled={done}
        aria-label={`Set ${setNum} reps`}
        onChange={e=>onUpdate('reps',e.target.value)} placeholder="reps"/>
      <button className={'ck'+(done?' done':isNext?' ready':'')}
        disabled={done?false:!isNext||!canComplete}
        aria-label={done?`Set ${setNum} logged`:`Mark set ${setNum} complete`}
        onClick={()=>{if(isNext&&!done&&canComplete){vibrate(35);onComplete();}}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke={done?'white':'currentColor'} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"
          style={{opacity:done?1:(isNext ? .55 : .1),color:'var(--t2)'}}>
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
  );
}

function ExCard({exercise,exSets,onUpdateSet,onCompleteSet,lastSession,stats,workoutStarted,expanded,onToggle}){
  const [showWU,setShowWU]=useState(false);
  const doneCount=exSets.filter(s=>s.done).length;
  const allDone=doneCount===exSets.length&&exSets.length>0;
  const nextIdx=exSets.findIndex(s=>!s.done);
  const adjustAll=delta=>{
    exSets.forEach((_,i)=>{
      if(!exSets[i].done)onUpdateSet(i,'weight',Math.max(0,(parseFloat(exSets[i].weight)||0)+delta));
    });
  };

  if(exercise.isAbs){
    return(
      <div className={'excard'+(allDone?' ex-done':'')} style={{marginBottom:10}}>
        <div className="exhdr" onClick={onToggle}>
          <div style={{flex:1,minWidth:0}}>
            <div className="exname">Ab Circuit x{exercise.sets}</div>
            <div className="exmeta">Weighted + 2 unweighted · 2–3 min rest</div>
          </div>
          {allDone&&<span className="pill p-grn" style={{marginRight:8}}>Done</span>}
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" strokeWidth="2"
            style={{transform:expanded?'rotate(180deg)':'none',transition:'transform .2s',flexShrink:0}}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        {expanded&&(
          <div style={{padding:'4px 14px 14px'}}>
            <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.8,marginBottom:12}}>
              <b style={{color:'var(--t1)'}}>1.</b> Weighted (cable crunch / captain's chair / hanging raise) — 10–12 reps<br/>
              <b style={{color:'var(--t1)'}}>2.</b> Unweighted to failure<br/>
              <b style={{color:'var(--t1)'}}>3.</b> Unweighted to failure — rest 2–3 min · repeat x{exercise.sets}
            </div>
            {workoutStarted&&(
              <button className={'btn'+(allDone?' grn':' btn-ghost')} style={{borderRadius:10,fontSize:13}}
                onClick={()=>{vibrate(35);onCompleteSet(0);}}>
                {allDone?'✓ Completed':'Mark Complete'}
              </button>
            )}
          </div>
        )}
      </div>
    );
  }

  return(
    <div className={'excard'+(allDone?' ex-done':expanded&&workoutStarted?' ex-on':'')} style={{marginBottom:10}}>
      <div className="exhdr" onClick={onToggle}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div className="exname">{exercise.name}</div>
              {exercise.optional&&<span style={{fontSize:11,fontWeight:700,color:'var(--t3)',letterSpacing:'.05em'}}>OPT</span>}
            </div>
            <div className="exmeta">
              {exercise.sets}x{exercise.repRange}
              {stats?.bestSetLabel&&stats.bestSetLabel!=='—'&&` · Best ${stats.bestSetLabel}`}
              {stats?.bestE1RM&&` · e1RM ${stats.bestE1RM}`}
            </div>
          </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {allDone?(
            <div style={{width:22,height:22,borderRadius:'50%',background:'var(--grn)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          ):(
            <div style={{display:'flex',gap:4}}>
              {exSets.map((s,i)=>(
                <div key={i} className={'exdot'+(s.done?' d':i===nextIdx&&workoutStarted?' cur':'')}/>
              ))}
            </div>
          )}
          {exercise.warmup&&!allDone&&(
            <button style={{padding:'7px 11px',minHeight:32,borderRadius:8,background:'var(--s3)',border:'1px solid var(--bdr2)',fontSize:11,fontWeight:700,color:'var(--t2)',letterSpacing:'.06em',fontFamily:'inherit'}}
              onClick={e=>{e.stopPropagation();setShowWU(true);}}>WU</button>
          )}
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" strokeWidth="2"
            style={{transform:expanded?'rotate(180deg)':'none',transition:'transform .2s'}}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      {expanded&&(
        <>
          {workoutStarted&&repRangeTop(exercise.repRange)>0&&(
            <div style={{padding:'0 14px 10px',fontSize:12,color:'var(--t2)',lineHeight:1.5}}>
              <b style={{color:'var(--t1)'}}>Goal:</b> hit {repRangeTop(exercise.repRange)} reps on all {exercise.sets} sets.{' '}
              <span style={{color:'var(--t3)'}}>Last time: {lastSession?.length?lastSession.slice(0,exercise.sets).map(formatSetLabel).join(' · '):'no logged sets yet'}.</span>
            </div>
          )}
          <div className="sethdr"><div/><div style={{textAlign:'center'}}>PREV</div><div style={{textAlign:'center'}}>WEIGHT</div><div style={{textAlign:'center'}}>REPS</div><div/></div>
          <div style={{borderTop:'1px solid var(--bdr)'}}>
            {exSets.map((s,i)=>(
              <SetRow key={i} setNum={i+1}
                prev={lastSession?.[i]||null}
                data={s}
                onUpdate={(f,v)=>onUpdateSet(i,f,v)}
                onComplete={()=>onCompleteSet(i)}
                isNext={workoutStarted&&!s.done&&i===nextIdx}
                canComplete={window.canLogSet(exercise,s)}
                bodyweight={!!exercise.bodyweight}/>
            ))}
          </div>
          {workoutStarted&&!allDone&&(
            <div className="qa">
              <div className="qa-lbl">Adjust weight (lbs)</div>
              {[-10,-5,-2.5,2.5,5,10].map(d=>(
                <button key={d} className="qa-btn" onClick={()=>adjustAll(d)}>{d>0?'+':''}{d}</button>
              ))}
            </div>
          )}
        </>
      )}
      {showWU&&<WarmupSheet exerciseName={exercise.name} workingWeight={exSets[0]?.weight} onClose={()=>setShowWU(false)}/>}
    </div>
  );
}

function useElapsed(running,startAt){
  const [t,setT]=useState(()=>startAt?Math.max(0,Math.floor((Date.now()-startAt)/1000)):0);
  const ref=useRef(null);
  useEffect(()=>{
    if(running){
      const start=startAt||Date.now()-t*1000;
      setT(Math.max(0,Math.floor((Date.now()-start)/1000)));
      ref.current=setInterval(()=>setT(Math.floor((Date.now()-start)/1000)),1000);
      return()=>clearInterval(ref.current);
    }
  },[running,startAt]);
  return t;
}

const PRIMARY_REST_EXERCISES=new Set([
  'Barbell Deadlift',
  'Barbell Squat',
  'Barbell Front Squat',
  'Romanian Deadlift',
  'Flat Barbell Bench Press',
  'Incline Barbell Bench Press',
  'Barbell Military Press',
  'Close-Grip Bench Press'
]);
window.canLogSet=function(exercise,set){
  if(exercise.isAbs)return true;
  const reps=parseInt(set.reps,10)||0;
  const weight=parseFloat(set.weight)||0;
  if(reps<=0)return false;
  return exercise.bodyweight?true:weight>0;
};
window.getRestSeconds=function(exercise){
  if(exercise.isAbs)return 60;
  if(PRIMARY_REST_EXERCISES.has(exercise.name))return 210;
  if(exercise.repRange==='8-10')return 90;
  if(exercise.optional||exercise.bodyweight)return 105;
  return 120;
};
window.formatRestTime=function(seconds){
  const m=Math.floor((seconds||0)/60),s=(seconds||0)%60;
  return `${m}:${String(s).padStart(2,'0')}`;
};
window.getWarmupRestSeconds=function(warmupSet){
  const rest=String(warmupSet?.rest||'');
  if(rest.includes('2'))return 150;
  return 60;
};
window.stepKey=function(step){
  return `${step.type}:${step.exerciseName}:${step.setIndex}`;
};
window.stepLabel=function(step){
  if(!step)return '';
  if(step.type==='warmup')return `${step.exerciseName} · Warmup ${step.setIndex+1}`;
  if(step.type==='abs')return `Ab Circuit · Round ${step.setIndex+1}`;
  return `${step.exerciseName} · Set ${step.setIndex+1}`;
};
window.buildWorkoutSteps=function(dayData,sets,warmupLogs){
  const steps=[];
  (dayData.exercises||[]).forEach((ex,exIndex)=>{
    const exSets=sets[ex.name]||[];
    if(ex.isAbs){
      steps.push({type:'abs',exercise:ex,exerciseName:ex.name,exerciseIndex:exIndex,setIndex:0,totalSets:1,targetReps:'Circuit',targetWeight:'',done:!!exSets[0]?.done||!!exSets[0]?.skipped});
      return;
    }
    if(ex.warmup){
      const warmups=window.getWarmupSets(exSets[0]?.weight||0);
      warmups.forEach((wu,i)=>{
        const log=(warmupLogs[ex.name]||[])[i]||{};
        steps.push({
          type:'warmup',exercise:ex,exerciseName:ex.name,exerciseIndex:exIndex,setIndex:i,totalSets:warmups.length,
          targetReps:wu.reps,targetWeight:wu.weight,restLabel:wu.rest,restSeconds:window.getWarmupRestSeconds(wu),
          done:!!log.done
        });
      });
    }
    exSets.forEach((s,i)=>{
      steps.push({
        type:'work',exercise:ex,exerciseName:ex.name,exerciseIndex:exIndex,setIndex:i,totalSets:ex.sets,
        targetReps:s.reps,targetWeight:s.weight,done:!!s.done||!!s.skipped
      });
    });
  });
  return steps;
};

function WorkoutScreen({store,autoStartRequest,onAutoStartConsumed}){
  const {settings,setSettings,setLogs,getLastSession,getLastWeight,getExerciseStats}=store;
  const phase=WORKOUT_DATA.phases.find(p=>p.id===settings.currentPhase)||WORKOUT_DATA.phases[0];
  const dayData=phase.days[settings.currentDayIndex];
  const [started,setStarted]=useState(false);
  const [sessionStartedAt,setSessionStartedAt]=useState(null);
  const [done,setDone]=useState(false);
  const [sets,setSets]=useState({});
  const [warmupLogs,setWarmupLogs]=useState({});
  const [timer,setTimer]=useState(null);
  const [expanded,setExpanded]=useState({});
  const [sessionNote,setSessionNote]=useState('');
  const [guidedMode,setGuidedMode]=useState(()=>S.get('bf_guided_workout',true)!==false);
  const [showModeSheet,setShowModeSheet]=useState(false);
  const [showEndEarly,setShowEndEarly]=useState(false);
  const [showGuideActions,setShowGuideActions]=useState(false);
  const timerRef=useRef();
  const elapsed=useElapsed(started&&!done,sessionStartedAt);
  const em=Math.floor(elapsed/60),es=elapsed%60;

  useEffect(()=>{
    const init={},exp={};
    dayData.exercises.forEach((ex,i)=>{
      if(ex.isAbs){init[ex.name]=[{weight:0,reps:0,done:false}];}
      else{
        const lw=getLastWeight(ex.name)||'';
        // Pre-fill reps with top of target range (e.g., "4-6" → 6) to match
        // the "Add 10 lbs when you hit top of rep range" progression rule.
        // User taps down only when they fall short.
        const rangeTop=(()=>{
          const m=String(ex.repRange||'').match(/(\d+)\s*(?:[–-]\s*(\d+))?/);
          if(!m)return '';
          return m[2]||m[1]||'';
        })();
        init[ex.name]=Array(ex.sets).fill(null).map(()=>({weight:lw,reps:rangeTop,done:false}));
      }
      exp[i]=i===0;
    });
    const draft=getActiveWorkoutDraft();
    const canRestore=draft?.started&&draft.phase===settings.currentPhase&&draft.dayIndex===settings.currentDayIndex;
    const restoredTimer=canRestore&&draft.timer?.endsAt
      ?{...draft.timer,rem:Math.max(0,Math.ceil((draft.timer.endsAt-Date.now())/1000)),full:false}
      :null;
    setSets(canRestore&&draft.sets?draft.sets:init);
    setWarmupLogs(canRestore&&draft.warmupLogs?draft.warmupLogs:{});
    setExpanded(canRestore&&draft.expanded?draft.expanded:exp);
    setStarted(!!canRestore);
    setSessionStartedAt(canRestore?draft.sessionStartedAt||Date.now():null);
    setDone(false);
    setTimer(restoredTimer&&restoredTimer.rem>0?restoredTimer:null);
    setSessionNote(canRestore?draft.sessionNote||'':'');
    setShowModeSheet(false);setShowEndEarly(false);setShowGuideActions(false);
  },[settings.currentDayIndex,settings.currentPhase]);

  useEffect(()=>{
    if(!autoStartRequest)return;
    startWorkout();
    onAutoStartConsumed&&onAutoStartConsumed();
  },[autoStartRequest,onAutoStartConsumed]);

  useEffect(()=>{
    if(timer&&!timer.full){
      timerRef.current=setInterval(()=>{
        setTimer(t=>{
          if(!t||t.rem<=0){clearInterval(timerRef.current);return t?{...t,rem:0}:null;}
          if(t.rem===1){playBeep('end');vibrate([50,30,50]);}
          else if(t.rem<=4){vibrate(18);}
          return{...t,rem:t.rem-1};
        });
      },1000);
      return()=>clearInterval(timerRef.current);
    }
  },[timer?.id,timer?.full]);

  useEffect(()=>{S.set('bf_guided_workout',guidedMode);},[guidedMode]);

  useEffect(()=>{
    if(!started||done)return;
    S.set(ACTIVE_WORKOUT_KEY,{
      phase:settings.currentPhase,
      dayIndex:settings.currentDayIndex,
      started:true,
      sessionStartedAt:sessionStartedAt||Date.now(),
      sets,
      warmupLogs,
      expanded,
      sessionNote,
      guidedMode,
      timer:timer?{...timer,full:false}:null,
      savedAt:Date.now()
    });
  },[started,done,settings.currentPhase,settings.currentDayIndex,sessionStartedAt,sets,warmupLogs,expanded,sessionNote,guidedMode,timer?.id,timer?.dur,timer?.endsAt,timer?.fromLabel,timer?.nextLabel]);

  const startWorkout=()=>{
    setSessionStartedAt(Date.now());
    setStarted(true);
  };

  const updateSet=(exName,i,f,v)=>{
    setSets(prev=>{
      const n={...prev,[exName]:[...prev[exName]]};
      n[exName][i]={...n[exName][i],[f]:v};
      if(f==='weight')n[exName]=n[exName].map((s,j)=>j>i&&!s.weight?{...s,weight:v}:s);
      return n;
    });
  };

  const addTimerSeconds=seconds=>{
    setTimer(t=>t?{...t,dur:t.dur+seconds,rem:t.rem+seconds,endsAt:(t.endsAt||Date.now()+t.rem*1000)+seconds*1000}:t);
  };

  const stopTimer=()=>{
    clearInterval(timerRef.current);
    setTimer(null);
  };

  const startRestTimer=(exercise,fromLabel,nextStep,overrideSeconds,startWithoutNext=false)=>{
    if(!nextStep&&!startWithoutNext){stopTimer();return;}
    const dur=overrideSeconds||window.getRestSeconds(exercise||{});
    clearInterval(timerRef.current);
    setTimer({
      id:Date.now(),
      dur,
      rem:dur,
      endsAt:Date.now()+dur*1000,
      full:false,
      label:'Rest',
      fromLabel,
      nextLabel:nextStep?window.stepLabel(nextStep):''
    });
  };

  const completeSet=(exName,i,context={})=>{
    let allExDone=false;
    setSets(prev=>{
      const n={...prev,[exName]:[...prev[exName]]};
      n[exName][i]={...n[exName][i],done:true};
      allExDone=n[exName].every(s=>s.done);
      return n;
    });
    const ex=dayData.exercises.find(e=>e.name===exName);
    if(context.startRest!==false){
      const hasExplicitNext=Object.prototype.hasOwnProperty.call(context,'nextStep');
      startRestTimer(ex,context.fromLabel||`${exName} · Set ${i+1}`,context.nextStep,undefined,!hasExplicitNext);
    }
    // Auto-collapse done exercise, expand next
    setTimeout(()=>{
      const exIdx=dayData.exercises.findIndex(e=>e.name===exName);
      setSets(cur=>{
        if(cur[exName]?.every(s=>s.done)){
          const nextIdx=dayData.exercises.findIndex((e,j)=>j>exIdx&&!(cur[e.name]||[]).every(s=>s.done));
          setExpanded(p=>{const n2={...p};n2[exIdx]=false;if(nextIdx>-1)n2[nextIdx]=true;return n2;});
        }
        return cur;
      });
    },350);
  };

  const completeWarmup=(step,nextStep)=>{
    setWarmupLogs(prev=>{
      const current=prev[step.exerciseName]||[];
      const next=[...current];
      next[step.setIndex]={
        weight:parseFloat(step.targetWeight)||0,
        reps:parseInt(step.targetReps,10)||0,
        done:true
      };
      return {...prev,[step.exerciseName]:next};
    });
    vibrate(35);
    startRestTimer(step.exercise,window.stepLabel(step),nextStep,step.restSeconds);
  };

  const finishWorkout=()=>{
    const totalVol=Object.values(sets).reduce((a,ss)=>
      a+ss.filter(s=>s.done&&!s.skipped).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0);
    const exerciseSummaries=dayData.exercises.filter(ex=>!ex.isAbs).map(ex=>{
      const valid=(sets[ex.name]||[]).filter(s=>s.done&&!s.skipped);
      const top=repRangeTop(ex.repRange);
      const prev=getExerciseStats(ex.name);
      const currentBest=getBestSet(valid);
      const improved=!!currentBest&&(
        currentBest.e1rm>(prev?.bestE1RM||0)
        || currentBest.weight>(prev?.bestWeight||0)
        || currentBest.volume>(prev?.bestVolume||0)
      );
      const hitTop=top>0&&valid.length>=ex.sets&&valid.slice(0,ex.sets).every(s=>(parseInt(s.reps,10)||0)>=top&&hasLoggedLoad(s));
      const logged=valid.length;
      const missed=logged>0&&top>0&&!hitTop;
      return{
        name:ex.name,
        logged,
        total:ex.sets,
        bestSet:formatSetLabel(currentBest),
        improved,
        hitTop,
        missed
      };
    });
    const prHit=dayData.exercises.filter(ex=>{
      const prev=getExerciseStats(ex.name);
      const currentBest=getBestSet((sets[ex.name]||[]).filter(s=>s.done&&!s.skipped));
      if(!currentBest)return false;
      return currentBest.e1rm>(prev?.bestE1RM||0)
        || currentBest.weight>(prev?.bestWeight||0)
        || currentBest.volume>(prev?.bestVolume||0);
    }).map(e=>e.name);
    const completedAt=new Date().toISOString();
    const nextDayIndex=(settings.currentDayIndex+1)%phase.days.length;
    const entry={
      completedAt,
      sessionId:`${todayStr()}-${Date.now()}`,
      phase:settings.currentPhase,dayNum:dayData.dayNum,dayName:dayData.name,
      duration:elapsed,volume:totalVol,prsHit:prHit,
      notes:sessionNote.trim(),
      exercises:dayData.exercises.map(ex=>({
        name:ex.name,
        bodyweight:!!ex.bodyweight,
        sets:(sets[ex.name]||[]).filter(s=>s.done||s.skipped).map(s=>({
          weight:parseFloat(s.weight)||0,
          reps:parseInt(s.reps)||0,
          ...(s.skipped?{skipped:true}:{})
        }))
      }))
    };
    setLogs(p=>{
      const key=todayStr();
      const dayLogs=asDayLogs(p[key]);
      return {...p,[key]:[...dayLogs,entry]};
    });
    clearActiveWorkoutDraft();
    setDone({
      elapsed,totalVol,prHit,
      dayName:dayData.name,
      exerciseSummaries,
      progressed:exerciseSummaries.filter(s=>s.hitTop).map(s=>s.name),
      improved:exerciseSummaries.filter(s=>s.improved).map(s=>s.name),
      missed:exerciseSummaries.filter(s=>s.missed).map(s=>s.name),
      nextDayIndex,
      nextDayName:phase.days[nextDayIndex].name,
      nextDayNum:phase.days[nextDayIndex].dayNum,
      notes:entry.notes
    });
  };

  const startDate=parseDateInput(settings.startDate);
  const weekNum=Math.floor((Date.now()-startDate.getTime())/604800000)+1;
  const phaseWeek=weekNum-(settings.currentPhase-1)*9;
  const isDeload=phaseWeek===9;
  const isStrength=phaseWeek%4===0&&phaseWeek<9;
  const requiredExercises=dayData.exercises.filter(ex=>!ex.optional);
  const optionalCount=dayData.exercises.length-requiredExercises.length;
  const totalSets=requiredExercises.reduce((a,ex)=>a+(ex.isAbs?1:ex.sets),0);
  const doneSets=requiredExercises.reduce((a,ex)=>a+((sets[ex.name]||[]).filter(s=>s.done).length),0);
  const pct=totalSets>0?Math.round((doneSets/totalSets)*100):0;
  const allComplete=requiredExercises.every(ex=>(sets[ex.name]||[]).every(s=>s.done));
  const workoutSteps=useMemo(()=>window.buildWorkoutSteps(dayData,sets,warmupLogs),[dayData,sets,warmupLogs]);
  const activeStepIndex=workoutSteps.findIndex(step=>!step.done);
  const activeStep=activeStepIndex>-1?workoutSteps[activeStepIndex]:null;
  const nextStep=activeStepIndex>-1?workoutSteps[activeStepIndex+1]||null:null;
  const loggedStepCount=workoutSteps.filter(step=>step.done).length;
  const flowPct=workoutSteps.length>0?Math.round((loggedStepCount/workoutSteps.length)*100):0;
  const getExerciseCoach=ex=>{
    if(!ex||ex.isAbs)return null;
    const top=repRangeTop(ex.repRange);
    const current=countableSets(sets[ex.name]||[]);
    const completed=current.filter(s=>s.done);
    const last=getLastSession(ex.name)||[];
    const lastLine=last.length?last.slice(0,ex.sets).map(formatSetLabel).join(' · '):'No previous logged sets';
    const hitTop=top>0&&completed.length>=ex.sets&&completed.slice(0,ex.sets).every(s=>(parseInt(s.reps,10)||0)>=top&&hasLoggedLoad(s));
    const repsToTop=top>0?Math.max(0,(ex.sets*top)-completed.reduce((a,s)=>a+(parseInt(s.reps,10)||0),0)):0;
    return{
      top,
      lastLine,
      hitTop,
      repsToTop,
      goalLine:top>0?`Goal: hit ${top} reps on all ${ex.sets} sets to earn the next weight jump.`:'Goal: complete the programmed work cleanly.',
      progressLine:hitTop?'Progression earned for next time.':completed.length?`${repsToTop} reps left to fully own this exercise today.`:'Beat or match last time, then chase the top of the range.'
    };
  };
  const activeCoach=activeStep?.type==='work'?getExerciseCoach(activeStep.exercise):null;

  const logGuidedStep=()=>{
    if(!activeStep)return;
    if(activeStep.type==='warmup'){
      completeWarmup(activeStep,nextStep);
      return;
    }
    completeSet(activeStep.exerciseName,activeStep.setIndex,{
      fromLabel:window.stepLabel(activeStep),
      nextStep
    });
    vibrate(35);
  };

  const skipGuidedStep=()=>{
    if(!activeStep)return;
    if(activeStep.type==='warmup'){
      setWarmupLogs(prev=>{
        const current=prev[activeStep.exerciseName]||[];
        const next=[...current];
        next[activeStep.setIndex]={weight:parseFloat(activeStep.targetWeight)||0,reps:parseInt(activeStep.targetReps,10)||0,done:true,skipped:true};
        return {...prev,[activeStep.exerciseName]:next};
      });
      stopTimer();
    }
  };

  const setRemainingWarmups=(exerciseName,fromIndex,skipped)=>{
    const ex=dayData.exercises.find(e=>e.name===exerciseName);
    if(!ex?.warmup)return;
    const warmups=window.getWarmupSets((sets[exerciseName]||[])[0]?.weight||0);
    setWarmupLogs(prev=>{
      const current=prev[exerciseName]||[];
      const next=[...current];
      warmups.forEach((wu,i)=>{
        if(i>=fromIndex&&!next[i]?.done){
          next[i]={
            weight:parseFloat(wu.weight)||0,
            reps:parseInt(wu.reps,10)||0,
            done:true,
            ...(skipped?{skipped:true}:{})
          };
        }
      });
      return {...prev,[exerciseName]:next};
    });
  };

  const skipActiveExercise=()=>{
    if(!activeStep)return;
    const ex=dayData.exercises.find(e=>e.name===activeStep.exerciseName);
    if(!ex)return;
    if(activeStep.type==='warmup')setRemainingWarmups(activeStep.exerciseName,activeStep.setIndex,true);
    setSets(prev=>{
      const current=prev[activeStep.exerciseName]||[];
      const next=current.map((s,i)=>s.done||s.skipped?s:{...s,done:false,skipped:true});
      return {...prev,[activeStep.exerciseName]:next};
    });
    stopTimer();
    setShowGuideActions(false);
    vibrate(35);
  };

  const completeActiveExercise=()=>{
    if(!activeStep)return;
    const ex=dayData.exercises.find(e=>e.name===activeStep.exerciseName);
    if(!ex)return;
    if(activeStep.type==='warmup')setRemainingWarmups(activeStep.exerciseName,activeStep.setIndex,false);
    setSets(prev=>{
      const current=prev[activeStep.exerciseName]||[];
      const fallbackWeight=getLastWeight(activeStep.exerciseName)||'';
      const next=current.map(s=>{
        if(s.done||s.skipped)return s;
        return {
          ...s,
          weight:s.weight||(ex.bodyweight?0:fallbackWeight),
          done:true,
          skipped:false
        };
      });
      return {...prev,[activeStep.exerciseName]:next};
    });
    stopTimer();
    setShowGuideActions(false);
    vibrate(35);
  };

  if(done){
    const d=done;
    const dm=Math.floor(d.elapsed/60),ds=d.elapsed%60;
    return(
      <div className="screen fade-up" style={{alignItems:'center',justifyContent:'center',padding:24,gap:20}}>
        <div style={{width:88,height:88,borderRadius:'50%',background:'var(--grn-s)',border:'2px solid var(--grn)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:42}}>💪</div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:28,fontWeight:800,letterSpacing:'-.5px'}}>Session Complete</div>
          <div style={{fontSize:14,color:'var(--t2)',marginTop:6}}>{d.dayName}</div>
        </div>
        <div style={{display:'flex',gap:10,width:'100%'}}>
          <div className="wc-stat"><div className="wc-val">{dm}:{ds.toString().padStart(2,'0')}</div><div className="wc-key">Duration</div></div>
          <div className="wc-stat"><div className="wc-val">{d.totalVol>0?(d.totalVol>=1000?Math.round(d.totalVol/1000)+'k':d.totalVol):'—'}</div><div className="wc-key">Volume lbs</div></div>
          <div className="wc-stat"><div className="wc-val" style={{color:'var(--acc)'}}>{d.prHit?.length||0}</div><div className="wc-key">New PRs</div></div>
        </div>
        {d.prHit?.length>0&&(
          <div style={{background:'var(--acc-s)',border:'1px solid var(--acc-b)',borderRadius:12,padding:'12px 16px',width:'100%'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--acc)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>🏆 New PRs Hit</div>
            {d.prHit.map(n=><div key={n} style={{fontSize:13,color:'var(--t1)',marginTop:4}}>· {n}</div>)}
          </div>
        )}
        {(d.progressed?.length>0||d.improved?.length>0||d.missed?.length>0)&&(
          <div style={{background:'var(--s2)',border:'1px solid var(--bdr2)',borderRadius:12,padding:'14px 16px',width:'100%',display:'grid',gap:10}}>
            {d.progressed?.length>0&&(
              <div>
                <div style={{fontSize:11,color:'var(--grn)',fontWeight:800,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Progression Ready</div>
                <div style={{fontSize:13,color:'var(--t1)',lineHeight:1.55}}>{d.progressed.slice(0,3).join(', ')}{d.progressed.length>3?' +'+(d.progressed.length-3)+' more':''} · add 10 lbs next time.</div>
              </div>
            )}
            {d.improved?.length>0&&(
              <div>
                <div style={{fontSize:11,color:'var(--acc)',fontWeight:800,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Improved Today</div>
                <div style={{fontSize:13,color:'var(--t1)',lineHeight:1.55}}>{d.improved.slice(0,4).join(', ')}{d.improved.length>4?' +'+(d.improved.length-4)+' more':''}</div>
              </div>
            )}
            {d.missed?.length>0&&(
              <div>
                <div style={{fontSize:11,color:'var(--t2)',fontWeight:800,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Targets To Chase</div>
                <div style={{fontSize:13,color:'var(--t1)',lineHeight:1.55}}>{d.missed.slice(0,4).join(', ')}{d.missed.length>4?' +'+(d.missed.length-4)+' more':''}</div>
              </div>
            )}
          </div>
        )}
        <div style={{background:'var(--s2)',border:'1px solid var(--bdr2)',borderRadius:12,padding:'14px 20px',textAlign:'center',width:'100%'}}>
          <div style={{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Up Next</div>
          <div style={{fontSize:15,fontWeight:700}}>Day {d.nextDayNum} · {d.nextDayName}</div>
        </div>
        {d.notes&&(
          <div style={{background:'var(--s2)',border:'1px solid var(--bdr2)',borderRadius:12,padding:'14px 16px',width:'100%'}}>
            <div style={{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Session Notes</div>
            <div style={{fontSize:13,color:'var(--t1)',lineHeight:1.6}}>{d.notes}</div>
          </div>
        )}
        <button className="btn grn" onClick={()=>{setSettings({currentDayIndex:d.nextDayIndex});setDone(false);}}>Continue →</button>
      </div>
    );
  }

  return(
    <div className="screen">
      <div style={{padding:'calc(var(--top) + 14px) 16px 8px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:9}}>
          <span className="pill p-acc">{phase.label}</span>
          <span className="pill p-dim">Wk {Math.max(1,phaseWeek)}/8</span>
          {isDeload&&<span className="pill p-warn">Deload</span>}
          {isStrength&&<span className="pill p-dim">Strength Wk</span>}
          <button className="mode-toggle" style={{marginLeft:started?'8px':'auto'}} onClick={()=>setShowModeSheet(true)}>
            View: {guidedMode?'Guided':'Classic'} ▾
          </button>
          {started&&(
            <div style={{marginLeft:'auto',display:'flex',flexDirection:'column',alignItems:'flex-end',lineHeight:1}}>
              <span style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:2}}>Elapsed</span>
              <span style={{fontSize:21,fontWeight:800,color:'var(--acc)',fontVariantNumeric:'tabular-nums',letterSpacing:'-1px'}}>{em}:{es.toString().padStart(2,'0')}</span>
            </div>
          )}
        </div>
        <div style={{fontSize:22,fontWeight:800,letterSpacing:'-.5px',lineHeight:1.1}}>{dayData.name}</div>
        <div style={{fontSize:12,color:'var(--t2)',marginTop:3}}>
          {dayData.exercises.filter(e=>!e.isAbs).length} exercises · {dayData.exercises.filter(e=>!e.isAbs).reduce((a,e)=>a+e.sets,0)} sets
          {optionalCount>0&&` · ${optionalCount} optional`}
        </div>
      </div>

      {started&&(
        <div style={{padding:'6px 16px 10px',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.07em'}}>
              {guidedMode?`${loggedStepCount}/${workoutSteps.length} steps`:`${doneSets}/${totalSets} sets`}
            </div>
            <div style={{fontSize:11,fontWeight:700,color:(guidedMode?flowPct:pct)===100?'var(--grn)':'var(--acc)'}}>{guidedMode?flowPct:pct}%</div>
          </div>
          <div className="pbar"><div className="pbar-f" style={{width:(guidedMode?flowPct:pct)+'%',background:(guidedMode?flowPct:pct)===100?'var(--grn)':'var(--acc)'}}/></div>
        </div>
      )}

      <div style={{display:'flex',gap:6,padding:'0 16px 10px',overflowX:'auto',flexShrink:0}}>
        {phase.days.map((d,i)=>(
          <button key={i}
            style={{flexShrink:0,padding:'9px 12px',minHeight:42,borderRadius:10,fontSize:12.5,fontWeight:700,
              background:i===settings.currentDayIndex?'var(--acc-s)':'var(--s3)',
              color:i===settings.currentDayIndex?'var(--acc)':'var(--t2)',
              border:'1.5px solid '+(i===settings.currentDayIndex?'var(--acc-b)':'transparent'),
              opacity:started&&i!==settings.currentDayIndex ? .4 : 1,
              whiteSpace:'nowrap',fontFamily:'inherit',cursor:started?'default':'pointer',
              display:'inline-flex',alignItems:'center'}}
            disabled={started}
            onClick={()=>!started&&setSettings({currentDayIndex:i})}>
            {d.dayNum} · {d.name}
          </button>
        ))}
      </div>

      <div className="scroller" style={{padding:'0 16px'}}>
        {isDeload?(
          <div className="card" style={{padding:24,textAlign:'center',marginTop:8}}>
            <div style={{fontSize:40,marginBottom:12}}>🏖</div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Deload Week</div>
            <div style={{fontSize:13,color:'var(--t2)',lineHeight:1.75}}>No resistance training. Light cardio is fine.<br/>Recovery is where growth happens.</div>
          </div>
        ):(
          guidedMode&&started?(
            <div className="live-shell">
              {activeStep?(
                <>
                  <div className={'live-card'+(timer&&timer.rem>0?' resting':'')}>
                    <div className="live-kicker">
                      <span className={'pill '+(activeStep.type==='warmup'?'p-warn':activeStep.type==='work'?'p-acc':'p-dim')}>
                        {activeStep.type==='warmup'?'Warmup':activeStep.type==='abs'?'Circuit':'Working Set'}
                      </span>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:11,color:'var(--t3)',fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em'}}>
                          Step {activeStepIndex+1} of {workoutSteps.length}
                        </span>
                        <button className="btn-icon" style={{borderRadius:9}} aria-label="Exercise actions" onClick={()=>setShowGuideActions(true)}>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style={{color:'var(--t2)'}}>
                            <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
                          </svg>
                        </button>
                      </div>
                    </div>
                    <div className="live-title">{activeStep.exerciseName}</div>
                    <div className="live-sub">
                      {activeStep.type==='warmup'
                        ?`Warmup ${activeStep.setIndex+1} of ${activeStep.totalSets} · ${activeStep.restLabel||'Rest after'}`
                        :activeStep.type==='abs'
                          ?'Ab circuit · complete the full round'
                          :`Set ${activeStep.setIndex+1} of ${activeStep.totalSets} · Target ${activeStep.exercise.repRange}`}
                    </div>
                    {activeCoach&&(
                      <div className="live-hint" style={{marginTop:14}}>
                        <b style={{color:'var(--t1)'}}>Last time:</b> {activeCoach.lastLine}<br/>
                        <b style={{color:'var(--t1)'}}>Today:</b> {activeCoach.goalLine}<br/>
                        <span style={{color:activeCoach.hitTop?'var(--grn)':'var(--t2)',fontWeight:800}}>{activeCoach.progressLine}</span>
                      </div>
                    )}

                    {activeStep.type==='warmup'?(
                      <div className="live-target">
                        <div className="live-field">
                          <div className="live-field-label">Working Weight</div>
                          <div className="live-input-row">
                            <button className="live-stepper" onClick={()=>updateSet(activeStep.exerciseName,0,'weight',Math.max(0,(parseFloat((sets[activeStep.exerciseName]||[])[0]?.weight)||0)-5))}>−</button>
                            <input className="live-input" type="number" inputMode="decimal"
                              value={(sets[activeStep.exerciseName]||[])[0]?.weight||''}
                              onChange={e=>updateSet(activeStep.exerciseName,0,'weight',e.target.value)}
                              placeholder="lbs"/>
                            <button className="live-stepper" onClick={()=>updateSet(activeStep.exerciseName,0,'weight',(parseFloat((sets[activeStep.exerciseName]||[])[0]?.weight)||0)+5)}>+</button>
                          </div>
                        </div>
                        <div className="live-field">
                          <div className="live-field-label">This Warmup</div>
                          <div className="live-readout">{activeStep.targetWeight>0?activeStep.targetWeight:'—'} <span style={{fontSize:13,color:'var(--t3)',margin:'0 4px'}}>lb x</span> {activeStep.targetReps}</div>
                        </div>
                      </div>
                    ):activeStep.type==='abs'?(
                      <div className="live-hint" style={{marginTop:18}}>
                        <b style={{color:'var(--t1)'}}>Round:</b> Weighted 10-12 reps, unweighted to failure, unweighted to failure. Rest 2-3 minutes between rounds.
                      </div>
                    ):(
                      <div className="live-target">
                        <div className="live-field">
                          <div className="live-field-label">Weight</div>
                          <div className="live-input-row">
                            <button className="live-stepper" onClick={()=>updateSet(activeStep.exerciseName,activeStep.setIndex,'weight',Math.max(0,(parseFloat((sets[activeStep.exerciseName]||[])[activeStep.setIndex]?.weight)||0)-5))}>−</button>
                            <input className="live-input" type="number" inputMode="decimal"
                              value={(sets[activeStep.exerciseName]||[])[activeStep.setIndex]?.weight||''}
                              onChange={e=>updateSet(activeStep.exerciseName,activeStep.setIndex,'weight',e.target.value)}
                              placeholder={activeStep.exercise.bodyweight?'BW+':'lbs'}/>
                            <button className="live-stepper" onClick={()=>updateSet(activeStep.exerciseName,activeStep.setIndex,'weight',(parseFloat((sets[activeStep.exerciseName]||[])[activeStep.setIndex]?.weight)||0)+5)}>+</button>
                          </div>
                        </div>
                        <div className="live-field">
                          <div className="live-field-label">Reps</div>
                          <div className="live-input-row">
                            <button className="live-stepper" onClick={()=>updateSet(activeStep.exerciseName,activeStep.setIndex,'reps',Math.max(0,(parseInt((sets[activeStep.exerciseName]||[])[activeStep.setIndex]?.reps,10)||0)-1))}>−</button>
                            <input className="live-input" type="number" inputMode="numeric"
                              value={(sets[activeStep.exerciseName]||[])[activeStep.setIndex]?.reps||''}
                              onChange={e=>updateSet(activeStep.exerciseName,activeStep.setIndex,'reps',e.target.value)}
                              placeholder="reps"/>
                            <button className="live-stepper" onClick={()=>updateSet(activeStep.exerciseName,activeStep.setIndex,'reps',(parseInt((sets[activeStep.exerciseName]||[])[activeStep.setIndex]?.reps,10)||0)+1)}>+</button>
                          </div>
                        </div>
                      </div>
                    )}

                    {activeStep.type==='warmup'&&(
                      <div className="live-hint">Warmups are tracked for workout flow only. They will not inflate your working-set volume or PR history.</div>
                    )}

                    {timer&&timer.rem>0&&(
                      <div className="live-rest-panel">
                        <div className="live-rest-top">
                          <div>
                            <div style={{fontSize:11,color:'var(--grn)',fontWeight:800,textTransform:'uppercase',letterSpacing:'.09em',marginBottom:4}}>Resting Now</div>
                            <div className="live-rest-copy">
                              {timer.fromLabel&&<>From <b>{timer.fromLabel}</b><br/></>}
                              {timer.nextLabel&&<>Next <b>{timer.nextLabel}</b></>}
                            </div>
                          </div>
                          <div className="live-rest-time">{window.formatRestTime(timer.rem)}</div>
                        </div>
                        <div className="live-rest-actions">
                          <button onClick={()=>addTimerSeconds(30)}>+30 sec</button>
                          <button onClick={stopTimer}>{timer.rem===0?'Continue':'Skip rest'}</button>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="live-upcoming">
                    <div className="live-upcoming-head">
                      <div style={{fontSize:13,fontWeight:800}}>Workout Flow</div>
                      <div style={{fontSize:11,color:'var(--t3)',fontWeight:800}}>{doneSets}/{totalSets} working sets</div>
                    </div>
                    {workoutSteps.slice(Math.max(0,activeStepIndex-2),activeStepIndex+6).map((step,i)=>{
                      const realIndex=Math.max(0,activeStepIndex-2)+i;
                      const rowState=step.done?' done':realIndex===activeStepIndex?' active':timer?.nextLabel===window.stepLabel(step)?' resting':'';
                      return(
                        <div key={window.stepKey(step)} className={'live-step-row'+rowState}>
                          <div className="live-step-dot">{step.done?'✓':realIndex+1}</div>
                          <div className="live-step-main">
                            <div className="live-step-name">{step.exerciseName}</div>
                            <div className="live-step-meta">
                              {step.type==='warmup'
                                ?`Warmup ${step.setIndex+1} · ${step.targetWeight || '—'} lb x ${step.targetReps}`
                                :step.type==='abs'
                                  ?'Ab circuit'
                                  :`Set ${step.setIndex+1} · ${(sets[step.exerciseName]||[])[step.setIndex]?.weight || '—'} lb x ${(sets[step.exerciseName]||[])[step.setIndex]?.reps || '—'}`}
                            </div>
                          </div>
                          <span className={'pill '+(step.type==='warmup'?'p-warn':step.type==='work'?'p-acc':'p-dim')}>{step.type==='warmup'?'WU':step.type==='abs'?'ABS':'SET'}</span>
                        </div>
                      );
                    })}
                  </div>

                  <div className="card2" style={{padding:'14px 14px 12px'}}>
                    <div className="sec" style={{marginBottom:8}}>Session Notes</div>
                    <textarea
                      value={sessionNote}
                      onChange={e=>setSessionNote(e.target.value)}
                      placeholder="How did this session feel? Note substitutions, pain points, cues, or wins."
                      style={{width:'100%',minHeight:86,resize:'vertical',background:'var(--s3)',border:'1px solid var(--bdr2)',borderRadius:12,color:'var(--t1)',padding:'12px 13px',fontSize:13,lineHeight:1.5,fontFamily:'inherit',outline:'none'}}
                    />
                  </div>

                  <div className="live-sticky">
                    <button className={'btn'+(activeStep.type==='warmup'?' grn':'')}
                      disabled={!(timer&&timer.rem>0)&&activeStep.type==='work'&&!window.canLogSet(activeStep.exercise,(sets[activeStep.exerciseName]||[])[activeStep.setIndex]||{})}
                      onClick={timer&&timer.rem>0?stopTimer:logGuidedStep}>
                      {timer&&timer.rem>0?'Skip Rest & Start Next':activeStep.type==='warmup'?'Log Warmup ✓':activeStep.type==='abs'?'Complete Circuit ✓':'Log Set ✓'}
                    </button>
                    {!(timer&&timer.rem>0)&&activeStep.type==='warmup'&&(
                      <div className="live-secondary-row">
                        <button className="btn-ghost" onClick={skipGuidedStep}>
                          Skip Warmup
                        </button>
                      </div>
                    )}
                  </div>
                </>
              ):(
                <div className="live-shell" style={{paddingLeft:0,paddingRight:0}}>
                  <div className="live-card">
                    <span className="pill p-grn">All Sets Complete</span>
                    <div className="live-title" style={{marginTop:14}}>Ready to finish</div>
                    <div className="live-sub">Your working sets are logged. Finish the session to save volume, PRs, notes, and advance the program.</div>
                  </div>
                  <div className="live-sticky">
                    <button className="btn grn" onClick={finishWorkout}>Finish Session ✓</button>
                  </div>
                </div>
              )}
            </div>
          ):(
          <>
            {dayData.exercises.map((ex,i)=>(
              <ExCard key={ex.name+i}
                exercise={ex}
                exSets={sets[ex.name]||[]}
                onUpdateSet={(si,f,v)=>updateSet(ex.name,si,f,v)}
                onCompleteSet={si=>completeSet(ex.name,si)}
                lastSession={getLastSession(ex.name)}
                stats={getExerciseStats(ex.name)}
                workoutStarted={started}
                expanded={!!expanded[i]}
                onToggle={()=>setExpanded(p=>({...p,[i]:!p[i]}))}/>
            ))}
            {started&&(
              <div className="card2" style={{padding:'14px 14px 12px',marginBottom:12}}>
                <div className="sec" style={{marginBottom:8}}>Session Notes</div>
                <textarea
                  value={sessionNote}
                  onChange={e=>setSessionNote(e.target.value)}
                  placeholder="How did this session feel? Note substitutions, pain points, cues, or wins."
                  style={{width:'100%',minHeight:94,resize:'vertical',background:'var(--s3)',border:'1px solid var(--bdr2)',borderRadius:12,color:'var(--t1)',padding:'12px 13px',fontSize:13,lineHeight:1.5,fontFamily:'inherit',outline:'none'}}
                />
              </div>
            )}
            <div style={{height:8}}/>
            {started&&optionalCount>0&&(
              <div style={{fontSize:12,color:'var(--t3)',paddingBottom:10}}>Optional exercises can be skipped and finished later.</div>
            )}
            {!started?(
              <button className="btn" onClick={startWorkout}>Start Workout</button>
            ):allComplete?(
              <button className="btn grn" onClick={finishWorkout}>Finish Session ✓</button>
            ):(
              <div style={{display:'grid',gap:10}}>
                <button className="btn" disabled>Complete All Sets to Finish</button>
                <button className="btn-ghost" style={{minHeight:44}} onClick={()=>setShowEndEarly(true)}>End session early</button>
              </div>
            )}
            <div style={{height:24}}/>
          </>
          )
        )}
      </div>

      {showModeSheet&&(
        <div className="sheet">
          <div className="sheet-bg" onClick={()=>setShowModeSheet(false)}/>
          <div className="sheet-box slide-up">
            <div className="sheet-handle"/>
            <div style={{fontSize:18,fontWeight:800,marginBottom:14}}>Workout View</div>
            {[
              {mode:true,title:'Guided',copy:'One step at a time with automatic rest timers.'},
              {mode:false,title:'Classic',copy:'Full exercise list, log sets in any order.'},
            ].map(opt=>(
              <button key={opt.title}
                onClick={()=>{setGuidedMode(opt.mode);setShowModeSheet(false);}}
                style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'13px 0',borderBottom:'1px solid var(--bdr)',textAlign:'left',fontFamily:'inherit'}}>
                <div style={{width:24,height:24,borderRadius:'50%',border:'2px solid '+(guidedMode===opt.mode?'var(--acc)':'var(--bdr2)'),background:guidedMode===opt.mode?'var(--acc-s)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {guidedMode===opt.mode&&<div style={{width:10,height:10,borderRadius:'50%',background:'var(--acc)'}}/>}
                </div>
                <div>
                  <div style={{fontSize:15,fontWeight:800}}>{opt.title}</div>
                  <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.45,marginTop:2}}>{opt.copy}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {showEndEarly&&(
        <div className="sheet">
          <div className="sheet-bg" onClick={()=>setShowEndEarly(false)}/>
          <div className="sheet-box slide-up">
            <div className="sheet-handle"/>
            <div style={{fontSize:20,fontWeight:800,marginBottom:6}}>End now?</div>
            <div style={{fontSize:13,color:'var(--t2)',lineHeight:1.55,marginBottom:18}}>Only logged sets will be saved.</div>
            <div style={{display:'grid',gap:10}}>
              <button className="btn grn" onClick={()=>{setShowEndEarly(false);finishWorkout();}}>End session early</button>
              <button className="btn-ghost" style={{minHeight:44}} onClick={()=>setShowEndEarly(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showGuideActions&&activeStep&&(
        <div className="sheet">
          <div className="sheet-bg" onClick={()=>setShowGuideActions(false)}/>
          <div className="sheet-box slide-up">
            <div className="sheet-handle"/>
            <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>{activeStep.exerciseName}</div>
            <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.45,marginBottom:14}}>Adjust the current exercise without changing the program.</div>
            <div style={{display:'grid',gap:10}}>
              <button className="btn-ghost" style={{minHeight:48,textAlign:'left'}} onClick={skipActiveExercise}>Skip this exercise</button>
              <button className="btn" style={{minHeight:48}} onClick={completeActiveExercise}>Mark exercise complete</button>
              <button className="btn-ghost" style={{minHeight:44}} onClick={()=>setShowGuideActions(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {timer&&!timer.full&&timer.rem>0&&(
        <MiniTimer duration={timer.dur} remaining={timer.rem}
          onExpand={()=>setTimer(t=>t?{...t,full:true}:null)}
          onDismiss={stopTimer}
          onAddTime={addTimerSeconds}
          nextLabel={timer.nextLabel}/>
      )}
      {timer?.full&&(
        <TimerOverlay duration={timer.dur} label={timer.label}
          fromLabel={timer.fromLabel}
          nextLabel={timer.nextLabel}
          onAddTime={addTimerSeconds}
          onDismiss={stopTimer}/>
      )}
    </div>
  );
}
Object.assign(window,{WorkoutScreen,ExCard,SetRow});
</script>

<!-- ─── Progress Screen ─── -->
<script type="text/babel">
function LineChart({data}){
  if(!data||data.length<2)return(
    <div style={{height:130,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--t3)',fontSize:13,gap:8}}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--t4)" strokeWidth="1.5" strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Log 2+ sessions to chart progress
    </div>
  );
  const W=340,H=140,pl=40,pb=28,pt=12,pr=12;
  const iW=W-pl-pr,iH=H-pt-pb;
  const ws=data.map(d=>d.metric||d.e1rm||d.weight);
  const mn=Math.min(...ws),mx=Math.max(...ws),range=mx-mn||1;
  const pts=data.map((d,i)=>({
    x:pl+(i/(data.length-1))*iW,
    y:pt+iH-(((d.metric||d.e1rm||d.weight)-mn)/range)*iH,
    label:d.label||d.date.slice(5),
    value:d.metric||d.e1rm||d.weight
  }));
  const pathD=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const areaD=pathD+' L'+pts[pts.length-1].x+','+(pt+iH)+' L'+pts[0].x+','+(pt+iH)+' Z';
  return(
    <svg viewBox={'0 0 '+W+' '+H} className="chart-svg">
      <defs>
        <linearGradient id="cg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#5aa8ff" stopOpacity=".24"/>
          <stop offset="100%" stopColor="#5aa8ff" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,.5,1].map((t,i)=>{
        const y=pt+iH-t*iH,v=Math.round(mn+t*range);
        return(
          <g key={i}>
            <line x1={pl} y1={y} x2={pl+iW} y2={y} stroke="var(--bdr2)" strokeWidth="1" strokeDasharray="3,3"/>
            <text x={pl-6} y={y+4} fill="var(--t3)" fontSize="11" textAnchor="end">{v}</text>
          </g>
        );
      })}
      <path d={areaD} fill="url(#cg1)"/>
      <path d={pathD} fill="none" stroke="var(--acc)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4.5" fill="var(--bg)" stroke="var(--acc)" strokeWidth="2.5"/>)}
      {pts.filter((_,i)=>i===0||i===pts.length-1||(pts.length>3&&i===Math.floor(pts.length/2))).map((p,i)=>(
        <text key={i} x={Math.max(24,Math.min(316,p.x))} y={H-5} fill="var(--t3)" fontSize="11" textAnchor="middle">{p.label}</text>
      ))}
    </svg>
  );
}

function VolumeChart({data}){
  const max=Math.max(...data,1);
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const todayDow=new Date().getDay();
  return(
    <div style={{display:'flex',gap:6,alignItems:'flex-end',height:80,padding:'0 4px'}}>
      {data.map((v,i)=>{
        const h=v>0?Math.max(8,Math.round((v/max)*64)):3;
        const isT=i===todayDow;
        return(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <div style={{width:'100%',borderRadius:4,height:h,minHeight:3,transition:'height .5s ease',
              background:isT?(v>0?'var(--acc)':'var(--acc-s)'):v>0?'var(--s4)':'var(--s3)'}}/>
            <div style={{fontSize:11,fontWeight:700,color:isT?'var(--acc)':'var(--t3)',textTransform:'uppercase',letterSpacing:'.03em'}}>{days[i]}</div>
          </div>
        );
      })}
    </div>
  );
}

function HistoryScreen({store}){
  const {sessions,getHistory,getExerciseStats,getWeeklyVolume}=store;
  const [sel,setSel]=useState('');
  const allEx=useMemo(()=>{
    const s=new Set();
    sessions.forEach(l=>l.exercises?.forEach(e=>{if(countableSets(e.sets).length)s.add(e.name);}));
    return[...s].sort();
  },[sessions]);
  const hist=sel?getHistory(sel):[];
  const stats=sel?getExerciseStats(sel):null;
  const weekVol=getWeeklyVolume();
  const totalVol=weekVol.reduce((a,v)=>a+v,0);
  const logDays=sessions;

  return(
    <div className="screen">
      <div style={{padding:'calc(var(--top) + 16px) 16px 10px',flexShrink:0}}>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.5px'}}>Progress</div>
        <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>Track best sets, estimated 1RM, and session history</div>
      </div>
      <div className="scroller" style={{padding:'0 16px 20px'}}>
        <div className="card" style={{padding:16,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <div className="sec" style={{marginBottom:0}}>This Week's Volume</div>
            <div style={{fontSize:16,fontWeight:800,fontVariantNumeric:'tabular-nums',color:totalVol>0?'var(--t1)':'var(--t3)'}}>
              {totalVol>0?(totalVol>=1000?Math.round(totalVol/1000)+'k lbs':totalVol+' lbs'):'No sessions yet'}
            </div>
          </div>
          <VolumeChart data={weekVol}/>
        </div>

        <div className="card" style={{padding:16,marginBottom:12}}>
          <div className="sec">Exercise Progress</div>
          {allEx.length===0?(
            <div style={{fontSize:13,color:'var(--t2)'}}>Log workouts to track progress here.</div>
          ):(
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:sel?16:0}}>
              {allEx.map(n=>(
                <button key={n} className={'ex-chip'+(sel===n?' sel':'')} onClick={()=>setSel(sel===n?'':n)}>{n}</button>
              ))}
            </div>
          )}
          {sel&&(
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                <div style={{fontSize:14,fontWeight:700,flex:1,marginRight:8}}>{sel}</div>
                <div style={{display:'flex',gap:16}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:20,fontWeight:800,color:'var(--acc)',fontVariantNumeric:'tabular-nums'}}>{stats?.bestSetLabel||'—'}</div>
                    <div style={{fontSize:11,color:'var(--t3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>BEST SET</div>
                  </div>
                  <div style={{width:1,background:'var(--bdr)'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{stats?.metricValue||'—'}</div>
                    <div style={{fontSize:11,color:'var(--t3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>{stats?.metricLabel||'Metric'}</div>
                  </div>
                  <div style={{width:1,background:'var(--bdr)'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{stats?.sessionCount||hist.length}</div>
                    <div style={{fontSize:11,color:'var(--t3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>SESSIONS</div>
                  </div>
                </div>
              </div>
              <LineChart data={hist}/>
            </>
          )}
        </div>

        <div className="sec">Recent Sessions</div>
        {logDays.length===0?(
          <div className="card" style={{padding:20,textAlign:'center',color:'var(--t2)',fontSize:13}}>No sessions logged yet — Start Workout!</div>
        ):logDays.slice(0,10).map(log=>{
          const vol=log.volume||log.exercises?.reduce((a,ex)=>a+(countableSets(ex.sets).reduce((b,s)=>b+(s.weight||0)*(s.reps||0),0)||0),0)||0;
          const dm=log.duration?Math.floor(log.duration/60):null;
          const ds2=log.duration?log.duration%60:null;
          return(
            <div key={log.sessionId||`${log.date}-${log.sessionIndex||0}`} className="card" style={{padding:14,marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
                <div style={{fontWeight:700,fontSize:14}}>{log.dayName||'Workout'}</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  {dm!==null&&<div style={{fontSize:11,color:'var(--t2)'}}>{dm}:{ds2.toString().padStart(2,'0')}</div>}
                  <div style={{fontSize:11,color:'var(--t3)'}}>{log.date}</div>
                </div>
              </div>
              {vol>0&&<div style={{fontSize:11,color:'var(--acc)',fontWeight:700,marginBottom:5}}>{vol>=1000?Math.round(vol/1000)+'k':vol} lbs volume</div>}
              <div style={{fontSize:11,color:'var(--t2)',lineHeight:1.7}}>
                {log.exercises?.filter(e=>e.sets?.length>0).slice(0,3).map(e=>
                  e.name+' ('+e.sets.map(s=>s.skipped?'Skipped':(e.bodyweight&&!(parseFloat(s.weight)||0)?'BW':s.weight)+'x'+s.reps).join(', ')+')'
                ).join(' · ')}
                {(log.exercises?.filter(e=>e.sets?.length>0).length||0)>3&&' …'}
              </div>
              {log.notes&&<div style={{marginTop:6,fontSize:11,color:'var(--t2)',lineHeight:1.6}}>{log.notes}</div>}
              {log.prsHit?.length>0&&<div style={{marginTop:6,fontSize:11,color:'var(--acc)',fontWeight:700}}>🏆 PR: {log.prsHit.join(', ')}</div>}
            </div>
          );
        })}
        <div style={{height:16}}/>
      </div>
    </div>
  );
}
Object.assign(window,{HistoryScreen,LineChart,VolumeChart});
</script>

<!-- ─── Program Screen ─── -->
<script type="text/babel">

  const dotColors=['var(--acc)','#82beff','#a9d4ff','var(--grn)','#f5db92'];

  return(
    <div className="screen">
      <div style={{padding:'calc(var(--top) + 16px) 16px 10px',flexShrink:0}}>
        <button className="btn-ghost" style={{marginBottom:12,minHeight:44}} onClick={()=>setScreen('home')}>← Home</button>

            <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>8 weeks training + 1 deload week · home gym optimized</div>
          </div>

        {dp.days.map((day,di)=>(

              <div style={{width:36,height:36,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:dotColors[di],background:dotColors[di]+'20',flexShrink:0}}>{day.dayNum}</div>

                <div style={{fontSize:11,color:'var(--t2)',marginTop:1}}>{day.exercises.filter(e=>!e.isAbs).length} exercises · {day.exercises.filter(e=>!e.isAbs).reduce((a,e)=>a+e.sets,0)} sets</div>
              </div>
            </div>
            <div style={{padding:'6px 14px 10px'}}>
              {day.exercises.map((ex,ei)=>(
                <div key={ei} style={{display:'flex',alignItems:'center',padding:'8px 0',borderBottom:ei<day.exercises.length-1?'1px solid var(--bdr)':'none',gap:8}}>

                  {!ex.isAbs&&<div style={{fontSize:11,color:'var(--t3)',fontWeight:700,flexShrink:0}}>{ex.warmup?'★ ':''}{ex.sets}x{ex.repRange}</div>}
                </div>
              ))}

        <div className="sec" style={{marginTop:8}}>Training Rules</div>

          {[
            ['Rep Ranges','Heavy: 4–6 reps at ~85% 1RM · Accessory: 8–10 reps'],
            ['Equipment','Rack, bench, barbell, pull-up bar, adjustable dumbbells, and cable station'],
            ['Rest (primary)','3–4 minutes between heavy barbell sets'],
            ['Rest (accessory)','90–120 sec on dumbbells, cables, and assistance work'],
            ['Progression','Add 10 lbs when you hit top of rep range'],
            ['Tempo','2 sec down · 1 sec pause · 1–2 sec up'],

          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',padding:'11px 14px',borderBottom:'1px solid var(--bdr)',gap:12,alignItems:'flex-start'}}>

          ))}
        </div>
      </div>
    </div>
  );
}
Object.assign(window,{ProgramScreen});
</script>

<!-- ─── App Root ─── -->
<script type="text/babel">
function App(){
  const [screen,setScreen]=useState(()=>S.get('bf5_sc','home'));
  const [pendingWorkoutStart,setPendingWorkoutStart]=useState(0);
  const store=useStore();
  useEffect(()=>S.set('bf5_sc',screen),[screen]);
  const startWorkoutFromHome=()=>{
    setPendingWorkoutStart(v=>v+1);
    setScreen('today');
  };
  const resumeWorkoutFromHome=draft=>{
    if(draft?.phase&&Number.isInteger(draft.dayIndex)){
      store.setSettings({currentPhase:draft.phase,currentDayIndex:draft.dayIndex});
    }
    setScreen('today');
  };
  const clearPendingWorkoutStart=useCallback(()=>{
    setPendingWorkoutStart(0);
  },[]);
  return(
    <>
      {screen==='home'    &&<HomeScreen store={store} setScreen={setScreen} onStartWorkout={startWorkoutFromHome} onResumeWorkout={resumeWorkoutFromHome}/>}
      {screen==='today'   &&<WorkoutScreen store={store} autoStartRequest={pendingWorkoutStart} onAutoStartConsumed={clearPendingWorkoutStart}/>}
      {screen==='history' &&<HistoryScreen store={store}/>}
      {screen==='crossfit'&&<CrossfitScreen/>}
      {screen==='plan'    &&<ProgramScreen store={store} setScreen={setScreen}/>}
      <BottomNav screen={screen} setScreen={setScreen}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
