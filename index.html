<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bechtel Fit">
<meta name="theme-color" content="#07111f">
<link id="apple-touch-icon" rel="apple-touch-icon">
<title>Bechtel Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07111f;--s1:#0d1a2b;--s2:#11233a;--s3:#18314d;--s4:#234364;
  --acc:#5aa8ff;--acc-rgb:90,168,255;--acc-s:rgba(var(--acc-rgb),.14);--acc-b:rgba(var(--acc-rgb),.34);
  --grn:#f0c75e;--grn-rgb:240,199,94;--grn-s:rgba(var(--grn-rgb),.16);--grn-b:rgba(var(--grn-rgb),.34);
  --t1:#eef5ff;--t2:#9aafc9;--t3:#5d7493;--t4:#22354e;
  --bdr:#1a2f49;--bdr2:#274360;
  --nav:64px;--safe:env(safe-area-inset-bottom,0px);--top:env(safe-area-inset-top,0px);
  --r:16px;--ri:10px;--rp:100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;min-height:100dvh;overflow:hidden;background-color:#06101c;background-image:radial-gradient(circle at top, rgba(var(--acc-rgb),.18), transparent 34%),linear-gradient(180deg,#0a1730 0%,var(--bg) 58%,#06101c 100%);color:var(--t1);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(180deg, rgba(255,255,255,.025) 0%, rgba(255,255,255,0) 24%),var(--bg)}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
select{-webkit-appearance:none}
::-webkit-scrollbar{width:0;height:0}

/* Layout */
.screen{position:absolute;inset:0;bottom:calc(var(--nav) + var(--safe));display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Nav */
.nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe));background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:flex-start;padding-top:8px;z-index:200}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t3);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:color .2s;padding-top:4px}
.ntab svg{width:22px;height:22px;stroke-width:1.9;transition:transform .2s}
.ntab.on{color:var(--acc)}
.ntab.on svg{transform:scale(1.1)}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--rp);font-size:11px;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.p-acc{background:var(--acc-s);color:var(--acc);border:1px solid var(--acc-b)}
.p-dim{background:var(--s3);color:var(--t2);border:1px solid var(--bdr2)}
.p-grn{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.p-warn{background:rgba(var(--grn-rgb),.12);color:var(--grn);border:1px solid rgba(var(--grn-rgb),.22)}

/* Primary button */
.btn{background:var(--acc);color:#fff;border-radius:14px;font-size:15px;font-weight:700;padding:16px;width:100%;transition:opacity .15s,transform .1s;font-family:inherit;letter-spacing:.01em}
.btn:active{opacity:.85;transform:scale(.98)}
.btn:disabled{opacity:.28}
.btn.grn{background:var(--grn)}
.btn-ghost{background:var(--s3);color:var(--t1);border-radius:var(--ri);font-size:13px;font-weight:600;padding:9px 16px;border:1px solid var(--bdr2);font-family:inherit}
.btn-ghost:active{opacity:.7}
.btn-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--s3);border:1px solid var(--bdr2)}

/* Cards */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r)}
.card2{background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--ri)}

/* Set rows — core of the app */
.srow{display:grid;grid-template-columns:28px 54px 1fr 76px 52px;align-items:center;gap:6px;padding:6px 14px;min-height:62px;border-bottom:1px solid var(--bdr);transition:opacity .3s,background .2s}
.srow:last-child{border-bottom:none}
.srow.done{opacity:.35}
.srow.active-row{background:rgba(var(--acc-rgb),.07)}
.snum{font-size:12px;font-weight:800;color:var(--t3);text-align:center}
.sprev{text-align:center}
.sprev-w{font-size:15px;font-weight:700;color:var(--t2);line-height:1.15;font-variant-numeric:tabular-nums}
.sprev-r{font-size:10px;color:var(--t3);margin-top:1px}
.sinput{background:var(--s3);border:1.5px solid var(--bdr2);border-radius:var(--ri);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:800;text-align:center;height:52px;width:100%;outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s,background .15s;caret-color:var(--acc)}
.sinput:focus{border-color:var(--acc);background:var(--s2)}
.sinput.ai{border-color:rgba(var(--acc-rgb),.45)}
.sinput:disabled{background:transparent;border-color:transparent;font-size:17px;color:var(--t2)}
/* Check button */
.ck{width:52px;height:52px;border-radius:50%;border:2.5px solid var(--t4);background:var(--s3);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-family:inherit}
.ck:active{transform:scale(.9)}
.ck:disabled{opacity:.2}
.ck.ready{border-color:var(--acc);background:var(--acc-s)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(var(--acc-rgb),.55)}70%{box-shadow:0 0 0 10px rgba(var(--acc-rgb),0)}100%{box-shadow:0 0 0 0 rgba(var(--acc-rgb),0)}}
.ck.ready{animation:pulse 2.2s infinite}
.ck.done{border-color:var(--grn);background:var(--grn);animation:none}
@keyframes ckpop{0%{transform:scale(.6)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.ck.done svg{animation:ckpop .28s ease}

/* Exercise card */
.excard{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .25s,box-shadow .25s}
.excard.ex-on{border-color:rgba(var(--acc-rgb),.38);box-shadow:0 8px 28px rgba(var(--acc-rgb),.09)}
.excard.ex-done{border-color:rgba(var(--grn-rgb),.3)}
.exhdr{display:flex;align-items:center;padding:13px 14px;gap:10px;cursor:pointer;user-select:none;min-height:58px}
.exname{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.exmeta{font-size:11px;color:var(--t2);margin-top:2px}
.exdot{width:8px;height:8px;border-radius:50%;background:var(--s4);transition:background .2s,transform .15s}
.exdot.d{background:var(--grn);transform:scale(1.1)}
.exdot.cur{background:var(--acc);transform:scale(1.2)}
.sethdr{display:grid;grid-template-columns:28px 54px 1fr 76px 52px;gap:6px;padding:2px 14px 6px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)}
.qa{display:flex;gap:5px;flex-wrap:wrap;padding:10px 14px 13px;align-items:center}
.qa-lbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;width:100%}
.qa-btn{padding:7px 11px;background:var(--s3);border-radius:8px;font-size:12px;font-weight:700;color:var(--t2);border:1px solid var(--bdr2);transition:all .12s;font-family:inherit}
.qa-btn:active{background:var(--s2);color:var(--t1);transform:scale(.95)}

/* Progress bar */
.pbar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.pbar-f{height:100%;border-radius:2px;transition:width .4s ease}

/* Mini rest timer */
.mtimer{position:relative;height:52px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0;cursor:pointer;overflow:hidden}
.mtimer-bg{position:absolute;left:0;top:0;bottom:0;background:var(--acc-s);pointer-events:none;transition:width 1s linear}
.mtimer-time{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1.5px;color:var(--t1);position:relative;flex:1}
.mtimer-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);position:relative}
.mtimer-skip{font-size:13px;font-weight:700;color:var(--t2);padding:8px 14px;background:var(--s3);border-radius:8px;border:1px solid var(--bdr2);position:relative;font-family:inherit}

/* Full timer */
.tover{position:absolute;inset:0;background:rgba(7,17,31,.97);backdrop-filter:blur(20px);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.tring{position:relative;width:220px;height:220px}
.tcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.ttime{font-size:64px;font-weight:800;letter-spacing:-4px;font-variant-numeric:tabular-nums;transition:color .3s}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.ttime.ending{animation:tpulse .55s ease infinite;color:var(--acc)}
.tsub{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.tpresets{display:flex;gap:8px}
.tpre{background:var(--s2);color:var(--t2);border-radius:10px;font-size:14px;font-weight:700;padding:11px 18px;border:1px solid var(--bdr2);transition:all .15s;font-family:inherit}
.tpre.sel{background:var(--acc);color:#fff;border-color:transparent}
.tskip{background:var(--s2);color:var(--t2);border-radius:12px;font-size:15px;font-weight:700;padding:14px 40px;border:1px solid var(--bdr2);font-family:inherit}
.tskip:active{opacity:.8}

/* Sheets */
.sheet{position:absolute;inset:0;z-index:250;display:flex;flex-direction:column;justify-content:flex-end}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px)}
.sheet-box{position:relative;background:var(--s1);border-radius:24px 24px 0 0;padding:20px;padding-bottom:calc(20px + var(--safe));max-height:90%;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 18px}
.wu-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--bdr);gap:14px}
.wu-row:last-of-type{border-bottom:none}

/* Home */
.home-hdr{padding:calc(var(--top) + 20px) 16px 16px;background:var(--s1);border-bottom:1px solid var(--bdr);flex-shrink:0}
.greeting{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:14px}
.wdot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.wdot.logged{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.wdot.today{background:var(--acc-s);color:var(--acc);border:1px solid var(--acc-b)}
.wdot.empty{background:var(--s3);color:var(--t3);border:1px solid var(--bdr2)}
.stat-cell{flex:1;padding:13px 0;text-align:center;border-right:1px solid var(--bdr)}
.stat-cell:last-child{border-right:none}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.stat-key{font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.pr-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr)}
.pr-row:last-child{border-bottom:none}

/* Progress */
.ex-chip{padding:8px 14px;border-radius:var(--rp);font-size:12px;font-weight:700;background:var(--s3);color:var(--t2);border:1.5px solid transparent;cursor:pointer;font-family:inherit;transition:all .15s}
.ex-chip.sel{background:var(--acc-s);color:var(--acc);border-color:var(--acc-b)}
.chart-svg{width:100%;display:block}

/* Program */
.prog-tab{padding:8px 16px;border-radius:var(--rp);font-size:12px;font-weight:700;background:var(--s3);color:var(--t2);white-space:nowrap;border:none;font-family:inherit;transition:all .15s}
.prog-tab.sel{background:var(--acc);color:#fff}

/* Workout complete */
.wc-stat{background:var(--s2);border:1px solid var(--bdr2);border-radius:12px;padding:14px;text-align:center;flex:1}
.wc-val{font-size:26px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.wc-key{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}

/* Sec label */
.sec{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}

/* Anims */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .32s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slide-up{animation:slideUp .28s cubic-bezier(.32,.72,0,1)}
@keyframes prPop{0%{transform:scale(1.6);opacity:0}60%{transform:scale(.88)}100%{transform:scale(1);opacity:1}}
.pr-pop{animation:prPop .28s ease}
</style>

<script>
// Generate PWA icon on canvas
function genIcon(size) {
  var c = document.createElement('canvas');
  c.width = c.height = size; var x = c.getContext('2d'); var s = size;
  var r = s * 0.19;
  x.beginPath();
  x.moveTo(r,0); x.lineTo(s-r,0); x.arcTo(s,0,s,r,r);
  x.lineTo(s,s-r); x.arcTo(s,s,s-r,s,r);
  x.lineTo(r,s); x.arcTo(0,s,0,s-r,r);
  x.lineTo(0,r); x.arcTo(0,0,r,0,r); x.closePath();
  x.fillStyle='#0d1a2b'; x.fill();
  x.strokeStyle='#5aa8ff'; x.lineWidth=s*.02; x.globalAlpha=.5; x.stroke(); x.globalAlpha=1;
  x.fillStyle='rgba(255,255,255,0.07)';
  x.beginPath(); x.roundRect(s*.1,s*.45,s*.8,s*.08,s*.04); x.fill();
  x.fillStyle='#5aa8ff';
  x.beginPath(); x.roundRect(s*.09,s*.355,s*.085,s*.275,s*.02); x.fill();
  x.fillStyle='#2d74bf';
  x.beginPath(); x.roundRect(s*.035,s*.39,s*.058,s*.205,s*.015); x.fill();
  x.fillStyle='#5aa8ff';
  x.beginPath(); x.roundRect(s*.825,s*.355,s*.085,s*.275,s*.02); x.fill();
  x.fillStyle='#2d74bf';
  x.beginPath(); x.roundRect(s*.907,s*.39,s*.058,s*.205,s*.015); x.fill();
  x.fillStyle='#eef5ff';
  x.font='900 '+(s*.52)+'px "Arial Black",Arial,sans-serif';
  x.textAlign='center'; x.textBaseline='alphabetic';
  x.fillText('B',s*.505,s*.618);
  x.fillStyle='#f0c75e';
  x.font='700 '+(s*.086)+'px Arial,sans-serif';
  x.textBaseline='middle';
  x.fillText('FITNESS',s*.5,s*.853);
  return c;
}
window.addEventListener('DOMContentLoaded', function() {
  try {
    var icon = genIcon(512);
    var url = icon.toDataURL('image/png');
    document.getElementById('apple-touch-icon').href = url;
    var mf = {name:'Bechtel Fitness',short_name:'BFit',display:'standalone',background_color:'#07111f',theme_color:'#07111f',start_url:window.location.href,orientation:'portrait-primary',icons:[{src:url,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
    var mb = new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});
    var ml = document.createElement('link'); ml.rel='manifest'; ml.href=URL.createObjectURL(mb);
    document.head.appendChild(ml);
  } catch(e){}
});
</script>
</head>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- ─── Utilities ─── -->
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const S = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const pad2=n=>String(n).padStart(2,'0');
const dateKey=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const todayStr=()=>dateKey(new Date());
const parseDateInput=s=>{
  if(!s)return new Date();
  const [y,m,d]=String(s).split('-').map(Number);
  return y&&m&&d?new Date(y,m-1,d):new Date(s);
};
const asDayLogs=day=>Array.isArray(day)?day:day?[day]:[];
const normalizeLogs=raw=>{
  if(!raw||typeof raw!=='object')return{};
  return Object.entries(raw).reduce((acc,[date,val])=>{
    acc[date]=asDayLogs(val).filter(Boolean).map((entry,idx)=>({
      ...entry,
      completedAt:entry.completedAt||`${date}T00:00:00`,
      sessionId:entry.sessionId||`${date}-${idx+1}`
    }));
    return acc;
  },{});
};
const flattenLogs=logs=>Object.entries(logs).flatMap(([date,val])=>
  asDayLogs(val).map((entry,idx)=>({
    ...entry,
    date,
    sessionIndex:idx,
    completedAt:entry.completedAt||`${date}T00:00:00`
  }))
);
const sortSessionsDesc=(a,b)=>{
  const cmp=(b.completedAt||b.date).localeCompare(a.completedAt||a.date);
  if(cmp!==0)return cmp;
  return (b.sessionIndex||0)-(a.sessionIndex||0);
};
const estimate1RM=(weight,reps)=>{
  const w=parseFloat(weight)||0;
  const r=parseInt(reps,10)||0;
  return w>0&&r>0?Math.round(w*(1+r/30)):0;
};
const getSetVolume=s=>((parseFloat(s.weight)||0)*(parseInt(s.reps,10)||0));
const getBestSet=sets=>(sets||[]).reduce((best,s)=>{
  const weight=parseFloat(s.weight)||0;
  const reps=parseInt(s.reps,10)||0;
  const volume=weight*reps;
  const e1rm=estimate1RM(weight,reps);
  if(!reps&&!weight)return best;
  const next={weight,reps,volume,e1rm};
  if(!best)return next;
  if(next.e1rm!==best.e1rm)return next.e1rm>best.e1rm?next:best;
  if(next.weight!==best.weight)return next.weight>best.weight?next:best;
  if(next.reps!==best.reps)return next.reps>best.reps?next:best;
  return next.volume>best.volume?next:best;
},null);
const formatBestSet=set=>{
  if(!set)return'—';
  if(set.weight>0)return`${set.weight}x${set.reps}`;
  return`${set.reps} reps`;
};
const getMetricMeta=set=>{
  if(!set)return{metricValue:null,metricLabel:'Metric'};
  if(set.e1rm>0)return{metricValue:set.e1rm,metricLabel:'EST 1RM'};
  if(set.weight>0)return{metricValue:set.weight,metricLabel:'TOP LOAD'};
  return{metricValue:set.reps||null,metricLabel:'TOP REPS'};
};
const vibrate=(p=30)=>{try{navigator.vibrate&&navigator.vibrate(p);}catch{}};

function playBeep(type) {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const seq=type==='end'
      ?[{f:880,t:0,d:.12},{f:1100,t:.18,d:.12},{f:880,t:.36,d:.2}]
      :[{f:500,t:0,d:.07},{f:660,t:.09,d:.07}];
    seq.forEach(({f,t,d})=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      const T=ctx.currentTime+t;
      g.gain.setValueAtTime(.18,T);
      g.gain.exponentialRampToValueAtTime(.001,T+d);
      o.start(T);o.stop(T+d+.05);
    });
    setTimeout(()=>ctx.close(),1500);
  }catch{}
}

function getGreeting(){
  const h=new Date().getHours();
  if(h<5)return'Still grinding 🌙';
  if(h<12)return'Good morning 🌅';
  if(h<17)return'Good afternoon ☀️';
  if(h<21)return'Good evening 🌆';
  return'Night session 🌙';
}

function useStore(){
  const [settings,_ss]=useState(()=>S.get('bf5_s',{startDate:todayStr(),currentPhase:1,currentDayIndex:0}));
  const [logs,_sl]=useState(()=>normalizeLogs(S.get('bf5_l',{})));
  const setSettings=u=>{const n=typeof u==='function'?u(settings):{...settings,...u};_ss(n);S.set('bf5_s',n);};
  const setLogs=u=>{
    const raw=typeof u==='function'?u(logs):u;
    const n=normalizeLogs(raw);
    _sl(n);
    S.set('bf5_l',n);
  };
  const sessions=useMemo(()=>flattenLogs(logs).sort(sortSessionsDesc),[logs]);

  const getLastSession=useCallback(name=>{
    for(const l of sessions){
      const ex=l.exercises?.find(e=>e.name===name);
      if(ex?.sets?.length)return ex.sets;
    }
    return null;
  },[sessions]);

  const getLastWeight=useCallback(name=>{
    return getLastSession(name)?.find(s=>s.weight>0)?.weight||null;
  },[getLastSession]);

  const getExerciseStats=useCallback(name=>{
    let bestWeight=0,bestE1RM=0,bestVolume=0,sessionCount=0,bestSet=null;
    sessions.forEach(l=>{
      const ex=l.exercises?.find(e=>e.name===name);
      if(!ex?.sets?.length)return;
      sessionCount++;
      const sessionBest=getBestSet(ex.sets);
      if(sessionBest){
        if(!bestSet
          || sessionBest.e1rm>bestSet.e1rm
          || (sessionBest.e1rm===bestSet.e1rm&&sessionBest.weight>bestSet.weight)
          || (sessionBest.e1rm===bestSet.e1rm&&sessionBest.weight===bestSet.weight&&sessionBest.reps>bestSet.reps)
        )bestSet=sessionBest;
        bestWeight=Math.max(bestWeight,...ex.sets.map(s=>parseFloat(s.weight)||0));
        bestE1RM=Math.max(bestE1RM,...ex.sets.map(s=>estimate1RM(s.weight,s.reps)));
        bestVolume=Math.max(bestVolume,...ex.sets.map(getSetVolume));
      }
    });
    if(!sessionCount)return null;
    return{
      bestWeight:bestWeight||null,
      bestE1RM:bestE1RM||null,
      bestVolume:bestVolume||null,
      bestSet,
      ...getMetricMeta(bestSet),
      bestSetLabel:formatBestSet(bestSet),
      sessionCount
    };
  },[sessions]);

  const getPR=useCallback(name=>{
    return getExerciseStats(name)?.bestWeight||null;
  },[getExerciseStats]);

  const getHistory=useCallback(name=>{
    const filtered=[...sessions].reverse().filter(l=>l.exercises?.some(e=>e.name===name));
    const perDate=filtered.reduce((acc,l)=>({...acc,[l.date]:(acc[l.date]||0)+1}),{});
    const seen={};
    return filtered.map(l=>{
      const ex=l.exercises.find(e=>e.name===name);
      const best=getBestSet(ex?.sets||[]);
      seen[l.date]=(seen[l.date]||0)+1;
      return{
        date:l.date,
        label:perDate[l.date]>1?`${l.date.slice(5)} #${seen[l.date]}`:l.date.slice(5),
        weight:best?.weight||0,
        reps:best?.reps||0,
        e1rm:best?.e1rm||0,
        metric:best?.e1rm||best?.weight||best?.reps||0,
        volume:best?.volume||0
      };
    });
  },[sessions]);

  const getStreak=useCallback(()=>{
    let streak=0,d=new Date();d.setHours(0,0,0,0);
    for(let i=0;i<60;i++){
      const k=dateKey(d);
      if(asDayLogs(logs[k]).length){streak++;}else if(i>0)break;
      d.setDate(d.getDate()-1);
    }
    return streak;
  },[logs]);

  const getWeekDays=useCallback(()=>{
    const lbl=['Su','Mo','Tu','We','Th','Fr','Sa'];
    const today=new Date();today.setHours(0,0,0,0);
    const dow=today.getDay();
    return Array(7).fill(null).map((_,i)=>{
      const d=new Date(today);d.setDate(today.getDate()-dow+i);
      const k=dateKey(d);
      return {label:lbl[d.getDay()],key:k,logged:asDayLogs(logs[k]).length>0,isToday:k===todayStr()};
    });
  },[logs]);

  const getWeeklyVolume=useCallback(()=>{
    const today=new Date();today.setHours(0,0,0,0);
    const dow=today.getDay();
    return Array(7).fill(null).map((_,i)=>{
      const d=new Date(today);d.setDate(today.getDate()-dow+i);
      const k=dateKey(d);
      const dayLogs=asDayLogs(logs[k]);
      if(!dayLogs.length)return 0;
      return dayLogs.reduce((sum,log)=>
        sum+(log.exercises?.reduce((a,ex)=>a+(ex.sets?.reduce((b,s)=>b+getSetVolume(s),0)||0),0)||0)
      ,0);
    });
  },[logs]);

  const getAllPRs=useCallback(()=>{
    const prs={};
    for(const l of sessions){
      l.exercises?.forEach(ex=>{
        const best=getBestSet(ex.sets||[]);
        if(!best)return;
        if(!prs[ex.name]
          || best.e1rm>prs[ex.name].e1rm
          || (best.e1rm===prs[ex.name].e1rm&&best.weight>prs[ex.name].weight)
          || (best.e1rm===prs[ex.name].e1rm&&best.weight===prs[ex.name].weight&&best.reps>prs[ex.name].reps)
        )prs[ex.name]=best;
      });
    }
    return Object.entries(prs)
      .map(([name,best])=>({name,...best,bestSetLabel:formatBestSet(best),...getMetricMeta(best)}))
      .filter(pr=>pr.weight>0||pr.reps>0)
      .sort((a,b)=>b.e1rm-a.e1rm||b.weight-a.weight);
  },[sessions]);

  return{settings,setSettings,logs,setLogs,sessions,getLastSession,getLastWeight,getExerciseStats,getPR,getHistory,getStreak,getWeekDays,getWeeklyVolume,getAllPRs};
}

Object.assign(window,{useStore,playBeep,vibrate,S,todayStr,getGreeting,estimate1RM,getBestSet,formatBestSet});
</script>

<script type="text/babel">
function TimerOverlay({duration:initDur, onDismiss, label}){
  const [dur,setDur]=useState(initDur);
  const [rem,setRem]=useState(initDur);
  const ref=useRef();
  useEffect(()=>{
    ref.current=setInterval(()=>{
      setRem(r=>{
        if(r<=1){clearInterval(ref.current);playBeep('end');vibrate([50,30,50]);return 0;}
        if(r===11){vibrate(20);}
        return r-1;
      });
    },1000);
    return()=>clearInterval(ref.current);
  },[dur]);
  const m=Math.floor(rem/60),s=rem%60;
  const circ=2*Math.PI*96,off=circ*(1-rem/dur);
  return(
    <div className="tover slide-up">
      <div style={{fontSize:11,color:'var(--t2)',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase'}}>Rest Timer</div>
      <div className="tring">
        <svg width="220" height="220" viewBox="0 0 220 220" style={{position:'absolute',inset:0,transform:'rotate(-90deg)'}}>
          <circle fill="none" stroke="var(--s3)" strokeWidth="9" cx="110" cy="110" r="96"/>
          <circle fill="none" stroke={rem<=10?'var(--acc)':'var(--grn)'} strokeWidth="9" strokeLinecap="round"
            cx="110" cy="110" r="96" strokeDasharray={circ} strokeDashoffset={off}
            style={{transition:'stroke-dashoffset 1s linear,stroke .3s'}}/>
        </svg>
        <div className="tcenter">
          <div className={'ttime'+(rem<=10?' ending':'')}>{m}:{s.toString().padStart(2,'0')}</div>
          <div className="tsub">{rem===0?'Go!':label||'Rest'}</div>
        </div>
      </div>
      <div className="tpresets">
        {[60,90,120,180].map(sec=>(
          <button key={sec} className={'tpre'+(dur===sec?' sel':'')}
            onClick={()=>{clearInterval(ref.current);setDur(sec);setRem(sec);}}>
            {sec<120?sec+'s':sec/60+'m'}
          </button>
        ))}
      </div>
      <button className="tskip" onClick={onDismiss}>{rem===0?'Start Next Set →':'Skip Rest'}</button>
    </div>
  );
}

function MiniTimer({duration,remaining,onExpand,onDismiss}){
  const m=Math.floor(remaining/60),s=remaining%60;
  const pct=(remaining/duration)*100;
  return(
    <div className="mtimer" onClick={onExpand}>
      <div className="mtimer-bg" style={{width:pct+'%'}}/>
      <svg style={{position:'relative',flexShrink:0,transform:'rotate(-90deg)'}} width="32" height="32" viewBox="0 0 32 32">
        <circle fill="none" stroke="var(--s4)" strokeWidth="3" cx="16" cy="16" r="13"/>
        <circle fill="none" stroke="var(--grn)" strokeWidth="3" strokeLinecap="round"
          cx="16" cy="16" r="13"
          strokeDasharray={2*Math.PI*13}
          strokeDashoffset={2*Math.PI*13*(1-remaining/duration)}
          style={{transition:'stroke-dashoffset 1s linear'}}/>
      </svg>
      <span className="mtimer-lbl">Rest</span>
      <span className="mtimer-time">{m}:{s.toString().padStart(2,'0')}</span>
      <button className="mtimer-skip" onClick={e=>{e.stopPropagation();onDismiss();}}>Skip</button>
    </div>
  );
}

function WarmupSheet({exerciseName,workingWeight,onClose}){
  const [wt,setWt]=useState(workingWeight||'');
  const sets=window.getWarmupSets(wt);
  // Plate calculator
  const plateInfo=useMemo(()=>{
    const total=parseFloat(wt)||0;
    if(total<45)return null;
    const perSide=(total-45)/2;
    const avail=[45,35,25,10,5,2.5];
    const result=[];let rem=perSide;
    avail.forEach(p=>{const n=Math.floor(rem/p);if(n>0){result.push({p,n});rem-=n*p;}});
    return{perSide,plates:result};
  },[wt]);

  return(
    <div className="sheet">
      <div className="sheet-bg" onClick={onClose}/>
      <div className="sheet-box slide-up">
        <div className="sheet-handle"/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:17,fontWeight:800}}>Warm-Up Calculator</div>
            <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>{exerciseName}</div>
          </div>
          <button className="btn-ghost" onClick={onClose}>Done</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,background:'var(--s2)',borderRadius:12,padding:'12px 14px',marginBottom:4}}>
          <span style={{fontSize:13,color:'var(--t2)',flex:1}}>Working weight (lbs)</span>
          <button onClick={()=>setWt(v=>Math.max(0,(parseFloat(v)||0)-5))}
            style={{width:36,height:36,borderRadius:8,background:'var(--s3)',border:'1px solid var(--bdr2)',color:'var(--t1)',fontSize:20,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>−</button>
          <input type="number" inputMode="decimal" value={wt} onChange={e=>setWt(e.target.value)}
            style={{background:'var(--s3)',border:'1.5px solid var(--bdr2)',borderRadius:10,color:'var(--t1)',fontFamily:'inherit',fontSize:20,fontWeight:800,textAlign:'center',width:88,height:44,outline:'none'}}
            placeholder="lbs"/>
          <button onClick={()=>setWt(v=>(parseFloat(v)||0)+5)}
            style={{width:36,height:36,borderRadius:8,background:'var(--s3)',border:'1px solid var(--bdr2)',color:'var(--t1)',fontSize:20,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>+</button>
        </div>
        {plateInfo&&plateInfo.perSide>0&&(
          <div style={{fontSize:11,color:'var(--t2)',textAlign:'right',padding:'4px 2px 12px'}}>
            Plates per side: {plateInfo.plates.map(({p,n})=>n+'×'+p).join(' + ')||'bar only'}
          </div>
        )}
        {sets.map((set,i)=>(
          <div key={i} className="wu-row">
            <div style={{width:38,fontSize:11,color:'var(--t2)',fontWeight:700}}>{Math.round(set.pct*100)}%</div>
            <div style={{flex:1}}>
              <div style={{fontSize:26,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{set.weight>0?set.weight+' lbs':'— lbs'}</div>
              <div style={{fontSize:12,color:'var(--t2)'}}>{set.reps} reps</div>
            </div>
            <div style={{fontSize:11,color:'var(--t3)',fontWeight:600,textAlign:'right'}}>{set.rest}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window,{TimerOverlay,MiniTimer,WarmupSheet});
</script>

function SetRow({setNum,prev,data,onUpdate,onComplete,isNext,canComplete,bodyweight}){

  return(
    <div className={'srow'+(done?' done':isNext?' active-row':'')}>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke={done?'white':'currentColor'} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"

}

function ExCard({exercise,exSets,onUpdateSet,onCompleteSet,lastSession,stats,workoutStarted,expanded,onToggle}){
  const [showWU,setShowWU]=useState(false);
  const doneCount=exSets.filter(s=>s.done).length;
  const allDone=doneCount===exSets.length&&exSets.length>0;
  const nextIdx=exSets.findIndex(s=>!s.done);
  const adjustAll=delta=>{
    exSets.forEach((_,i)=>{
      if(!exSets[i].done)onUpdateSet(i,'weight',Math.max(0,(parseFloat(exSets[i].weight)||0)+delta));
    });
  };

  if(exercise.isAbs){
    return(
      <div className={'excard'+(allDone?' ex-done':'')} style={{marginBottom:10}}>
        <div className="exhdr" onClick={onToggle}>
          <div style={{flex:1,minWidth:0}}>
            <div className="exname">Ab Circuit x{exercise.sets}</div>
            <div className="exmeta">Weighted + 2 unweighted · 2–3 min rest</div>
          </div>
          {allDone&&<span className="pill p-grn" style={{marginRight:8}}>Done</span>}
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" strokeWidth="2"
            style={{transform:expanded?'rotate(180deg)':'none',transition:'transform .2s',flexShrink:0}}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        {expanded&&(
          <div style={{padding:'4px 14px 14px'}}>
            <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.8,marginBottom:12}}>
              <b style={{color:'var(--t1)'}}>1.</b> Weighted (cable crunch / captain's chair / hanging raise) — 10–12 reps<br/>
              <b style={{color:'var(--t1)'}}>2.</b> Unweighted to failure<br/>
              <b style={{color:'var(--t1)'}}>3.</b> Unweighted to failure — rest 2–3 min · repeat x{exercise.sets}
            </div>
            {workoutStarted&&(
              <button className={'btn'+(allDone?' grn':' btn-ghost')} style={{borderRadius:10,fontSize:13}}
                onClick={()=>{vibrate(35);onCompleteSet(0);}}>
                {allDone?'✓ Completed':'Mark Complete'}
              </button>
            )}
          </div>
        )}
      </div>
    );
  }

  return(
    <div className={'excard'+(allDone?' ex-done':expanded&&workoutStarted?' ex-on':'')} style={{marginBottom:10}}>
      <div className="exhdr" onClick={onToggle}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div className="exname">{exercise.name}</div>
              {exercise.optional&&<span style={{fontSize:9,fontWeight:700,color:'var(--t3)',letterSpacing:'.05em'}}>OPT</span>}
            </div>
            <div className="exmeta">
              {exercise.sets}x{exercise.repRange}
              {stats?.bestSetLabel&&stats.bestSetLabel!=='—'&&` · Best ${stats.bestSetLabel}`}
              {stats?.bestE1RM&&` · e1RM ${stats.bestE1RM}`}
            </div>
          </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {allDone?(
            <div style={{width:22,height:22,borderRadius:'50%',background:'var(--grn)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          ):(
            <div style={{display:'flex',gap:4}}>
              {exSets.map((s,i)=>(
                <div key={i} className={'exdot'+(s.done?' d':i===nextIdx&&workoutStarted?' cur':'')}/>
              ))}
            </div>
          )}
          {exercise.warmup&&!allDone&&(
            <button style={{padding:'7px 11px',minHeight:32,borderRadius:8,background:'var(--s3)',border:'1px solid var(--bdr2)',fontSize:11,fontWeight:700,color:'var(--t2)',letterSpacing:'.06em',fontFamily:'inherit'}}
              onClick={e=>{e.stopPropagation();setShowWU(true);}}>WU</button>
          )}
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" strokeWidth="2"
            style={{transform:expanded?'rotate(180deg)':'none',transition:'transform .2s'}}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      {expanded&&(
        <>
          <div className="sethdr"><div/><div style={{textAlign:'center'}}>PREV</div><div style={{textAlign:'center'}}>WEIGHT</div><div style={{textAlign:'center'}}>REPS</div><div/></div>
          <div style={{borderTop:'1px solid var(--bdr)'}}>
            {exSets.map((s,i)=>(
              <SetRow key={i} setNum={i+1}
                prev={lastSession?.[i]||null}
                data={s}
                onUpdate={(f,v)=>onUpdateSet(i,f,v)}
                onComplete={()=>onCompleteSet(i)}
                isNext={workoutStarted&&!s.done&&i===nextIdx}
                canComplete={window.canLogSet(exercise,s)}
                bodyweight={!!exercise.bodyweight}/>
            ))}
          </div>
          {workoutStarted&&!allDone&&(
            <div className="qa">
              <div className="qa-lbl">Adjust weight (lbs)</div>
              {[-10,-5,-2.5,2.5,5,10].map(d=>(
                <button key={d} className="qa-btn" onClick={()=>adjustAll(d)}>{d>0?'+':''}{d}</button>
              ))}
            </div>
          )}
        </>
      )}
      {showWU&&<WarmupSheet exerciseName={exercise.name} workingWeight={exSets[0]?.weight} onClose={()=>setShowWU(false)}/>}
    </div>
  );
}

function useElapsed(running){
  const [t,setT]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    if(running){
      const start=Date.now()-t*1000;
      ref.current=setInterval(()=>setT(Math.floor((Date.now()-start)/1000)),1000);
      return()=>clearInterval(ref.current);
    }
  },[running]);
  return t;
}

const PRIMARY_REST_EXERCISES=new Set([
  'Barbell Deadlift',
  'Barbell Squat',
  'Barbell Front Squat',
  'Romanian Deadlift',
  'Flat Barbell Bench Press',
  'Incline Barbell Bench Press',
  'Barbell Military Press',
  'Close-Grip Bench Press'
]);
window.canLogSet=function(exercise,set){
  if(exercise.isAbs)return true;
  const reps=parseInt(set.reps,10)||0;
  const weight=parseFloat(set.weight)||0;
  if(reps<=0)return false;
  return exercise.bodyweight?true:weight>0;
};
window.getRestSeconds=function(exercise){
  if(exercise.isAbs)return 60;
  if(PRIMARY_REST_EXERCISES.has(exercise.name))return 210;
  if(exercise.repRange==='8-10')return 90;
  if(exercise.optional||exercise.bodyweight)return 105;
  return 120;
};

function WorkoutScreen({store}){
  const {settings,setSettings,setLogs,getLastSession,getLastWeight,getExerciseStats}=store;
  const phase=WORKOUT_DATA.phases.find(p=>p.id===settings.currentPhase)||WORKOUT_DATA.phases[0];
  const dayData=phase.days[settings.currentDayIndex];
  const [started,setStarted]=useState(false);
  const [done,setDone]=useState(false);
  const [sets,setSets]=useState({});
  const [timer,setTimer]=useState(null);
  const [expanded,setExpanded]=useState({});
  const [sessionNote,setSessionNote]=useState('');
  const timerRef=useRef();
  const elapsed=useElapsed(started&&!done);
  const em=Math.floor(elapsed/60),es=elapsed%60;

  useEffect(()=>{
    const init={},exp={};
    dayData.exercises.forEach((ex,i)=>{
      if(ex.isAbs){init[ex.name]=[{weight:0,reps:0,done:false}];}
      else{
        const lw=getLastWeight(ex.name)||'';
        // Pre-fill reps with top of target range (e.g., "4-6" → 6) to match
        // the "Add 10 lbs when you hit top of rep range" progression rule.
        // User taps down only when they fall short.
        const rangeTop=(()=>{
          const m=String(ex.repRange||'').match(/(\d+)\s*(?:[–-]\s*(\d+))?/);
          if(!m)return '';
          return m[2]||m[1]||'';
        })();
        init[ex.name]=Array(ex.sets).fill(null).map(()=>({weight:lw,reps:rangeTop,done:false}));
      }
      exp[i]=i===0;
    });
    setSets(init);setExpanded(exp);setStarted(false);setDone(false);setTimer(null);setSessionNote('');
  },[settings.currentDayIndex,settings.currentPhase]);

  useEffect(()=>{
    if(timer&&!timer.full){
      timerRef.current=setInterval(()=>{
        setTimer(t=>{
          if(!t||t.rem<=0){clearInterval(timerRef.current);return t?{...t,rem:0}:null;}
          if(t.rem===1){playBeep('end');vibrate([50,30,50]);}
          return{...t,rem:t.rem-1};
        });
      },1000);
      return()=>clearInterval(timerRef.current);
    }
  },[timer&&timer.dur]);

  const updateSet=(exName,i,f,v)=>{
    setSets(prev=>{
      const n={...prev,[exName]:[...prev[exName]]};
      n[exName][i]={...n[exName][i],[f]:v};
      if(f==='weight')n[exName]=n[exName].map((s,j)=>j>i&&!s.weight?{...s,weight:v}:s);
      return n;
    });
  };

  const completeSet=(exName,i)=>{
    let allExDone=false;
    setSets(prev=>{
      const n={...prev,[exName]:[...prev[exName]]};
      n[exName][i]={...n[exName][i],done:true};
      allExDone=n[exName].every(s=>s.done);
      return n;
    });
    const ex=dayData.exercises.find(e=>e.name===exName);
    const dur=window.getRestSeconds(ex||{});
    clearInterval(timerRef.current);
    setTimer({dur,rem:dur,full:false,label:exName});
    // Auto-collapse done exercise, expand next
    setTimeout(()=>{
      const exIdx=dayData.exercises.findIndex(e=>e.name===exName);
      setSets(cur=>{
        if(cur[exName]?.every(s=>s.done)){
          const nextIdx=dayData.exercises.findIndex((e,j)=>j>exIdx&&!(cur[e.name]||[]).every(s=>s.done));
          setExpanded(p=>{const n2={...p};n2[exIdx]=false;if(nextIdx>-1)n2[nextIdx]=true;return n2;});
        }
        return cur;
      });
    },350);
  };

  const finishWorkout=()=>{
    const totalVol=Object.values(sets).reduce((a,ss)=>
      a+ss.filter(s=>s.done).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0);
    const prHit=dayData.exercises.filter(ex=>{
      const prev=getExerciseStats(ex.name);
      const currentBest=getBestSet((sets[ex.name]||[]).filter(s=>s.done));
      if(!currentBest)return false;
      return currentBest.e1rm>(prev?.bestE1RM||0)
        || currentBest.weight>(prev?.bestWeight||0)
        || currentBest.volume>(prev?.bestVolume||0);
    }).map(e=>e.name);
    const completedAt=new Date().toISOString();
    const nextDayIndex=(settings.currentDayIndex+1)%phase.days.length;
    const entry={
      completedAt,
      sessionId:`${todayStr()}-${Date.now()}`,
      phase:settings.currentPhase,dayNum:dayData.dayNum,dayName:dayData.name,
      duration:elapsed,volume:totalVol,prsHit:prHit,
      notes:sessionNote.trim(),
      exercises:dayData.exercises.map(ex=>({
        name:ex.name,
        bodyweight:!!ex.bodyweight,
        sets:(sets[ex.name]||[]).filter(s=>s.done).map(s=>({weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0}))
      }))
    };
    setLogs(p=>{
      const key=todayStr();
      const dayLogs=asDayLogs(p[key]);
      return {...p,[key]:[...dayLogs,entry]};
    });
    setSettings({currentDayIndex:nextDayIndex});
    setDone({elapsed,totalVol,prHit,nextDayName:phase.days[nextDayIndex].name,nextDayNum:phase.days[nextDayIndex].dayNum,notes:entry.notes});
  };

  const startDate=parseDateInput(settings.startDate);
  const weekNum=Math.floor((Date.now()-startDate.getTime())/604800000)+1;
  const phaseWeek=weekNum-(settings.currentPhase-1)*9;
  const isDeload=phaseWeek===9;
  const isStrength=phaseWeek%4===0&&phaseWeek<9;
  const requiredExercises=dayData.exercises.filter(ex=>!ex.optional);
  const optionalCount=dayData.exercises.length-requiredExercises.length;
  const totalSets=requiredExercises.reduce((a,ex)=>a+(ex.isAbs?1:ex.sets),0);
  const doneSets=requiredExercises.reduce((a,ex)=>a+((sets[ex.name]||[]).filter(s=>s.done).length),0);
  const pct=totalSets>0?Math.round((doneSets/totalSets)*100):0;
  const allComplete=requiredExercises.every(ex=>(sets[ex.name]||[]).every(s=>s.done));

  if(done){
    const d=done;
    const dm=Math.floor(d.elapsed/60),ds=d.elapsed%60;
    return(
      <div className="screen fade-up" style={{alignItems:'center',justifyContent:'center',padding:24,gap:20}}>
        <div style={{width:88,height:88,borderRadius:'50%',background:'var(--grn-s)',border:'2px solid var(--grn)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:42}}>💪</div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:28,fontWeight:800,letterSpacing:'-.5px'}}>Session Complete</div>
          <div style={{fontSize:14,color:'var(--t2)',marginTop:6}}>{dayData.name}</div>
        </div>
        <div style={{display:'flex',gap:10,width:'100%'}}>
          <div className="wc-stat"><div className="wc-val">{dm}:{ds.toString().padStart(2,'0')}</div><div className="wc-key">Duration</div></div>
          <div className="wc-stat"><div className="wc-val">{d.totalVol>0?(d.totalVol>=1000?Math.round(d.totalVol/1000)+'k':d.totalVol):'—'}</div><div className="wc-key">Volume lbs</div></div>
          <div className="wc-stat"><div className="wc-val" style={{color:'var(--acc)'}}>{d.prHit?.length||0}</div><div className="wc-key">New PRs</div></div>
        </div>
        {d.prHit?.length>0&&(
          <div style={{background:'var(--acc-s)',border:'1px solid var(--acc-b)',borderRadius:12,padding:'12px 16px',width:'100%'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--acc)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>🏆 New PRs Hit</div>
            {d.prHit.map(n=><div key={n} style={{fontSize:13,color:'var(--t1)',marginTop:4}}>· {n}</div>)}
          </div>
        )}
        <div style={{background:'var(--s2)',border:'1px solid var(--bdr2)',borderRadius:12,padding:'14px 20px',textAlign:'center',width:'100%'}}>
          <div style={{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Up Next</div>
          <div style={{fontSize:15,fontWeight:700}}>Day {d.nextDayNum} · {d.nextDayName}</div>
        </div>
        {d.notes&&(
          <div style={{background:'var(--s2)',border:'1px solid var(--bdr2)',borderRadius:12,padding:'14px 16px',width:'100%'}}>
            <div style={{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Session Notes</div>
            <div style={{fontSize:13,color:'var(--t1)',lineHeight:1.6}}>{d.notes}</div>
          </div>
        )}
        <button className="btn grn" onClick={()=>setDone(false)}>Continue →</button>
      </div>
    );
  }

  return(
    <div className="screen">
      <div style={{padding:'14px 16px 8px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:9}}>
          <span className="pill p-acc">{phase.label}</span>
          <span className="pill p-dim">Wk {Math.max(1,phaseWeek)}/8</span>
          {isDeload&&<span className="pill p-warn">Deload</span>}
          {isStrength&&<span className="pill p-dim">Strength Wk</span>}
          {started&&(
            <div style={{marginLeft:'auto',display:'flex',flexDirection:'column',alignItems:'flex-end',lineHeight:1}}>
              <span style={{fontSize:9,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:2}}>Elapsed</span>
              <span style={{fontSize:21,fontWeight:800,color:'var(--acc)',fontVariantNumeric:'tabular-nums',letterSpacing:'-1px'}}>{em}:{es.toString().padStart(2,'0')}</span>
            </div>
          )}
        </div>
        <div style={{fontSize:22,fontWeight:800,letterSpacing:'-.5px',lineHeight:1.1}}>{dayData.name}</div>
        <div style={{fontSize:12,color:'var(--t2)',marginTop:3}}>
          {dayData.exercises.filter(e=>!e.isAbs).length} exercises · {dayData.exercises.filter(e=>!e.isAbs).reduce((a,e)=>a+e.sets,0)} sets
          {optionalCount>0&&` · ${optionalCount} optional`}
        </div>
      </div>

      {started&&(
        <div style={{padding:'6px 16px 10px',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.07em'}}>{doneSets}/{totalSets} sets</div>
            <div style={{fontSize:10,fontWeight:700,color:pct===100?'var(--grn)':'var(--acc)'}}>{pct}%</div>
          </div>
          <div className="pbar"><div className="pbar-f" style={{width:pct+'%',background:pct===100?'var(--grn)':'var(--acc)'}}/></div>
        </div>
      )}

      <div style={{display:'flex',gap:6,padding:'0 16px 10px',overflowX:'auto',flexShrink:0}}>
        {phase.days.map((d,i)=>(
          <button key={i}
            style={{flexShrink:0,padding:'11px 14px',minHeight:42,borderRadius:10,fontSize:12.5,fontWeight:700,
              background:i===settings.currentDayIndex?'var(--acc-s)':'var(--s3)',
              color:i===settings.currentDayIndex?'var(--acc)':'var(--t2)',
              border:'1.5px solid '+(i===settings.currentDayIndex?'var(--acc-b)':'transparent'),
              opacity:started&&i!==settings.currentDayIndex ? .4 : 1,
              whiteSpace:'nowrap',fontFamily:'inherit',cursor:started?'default':'pointer',
              display:'inline-flex',alignItems:'center'}}
            disabled={started}
            onClick={()=>!started&&setSettings({currentDayIndex:i})}>
            {d.dayNum} · {d.name.split(' ')[0]}
          </button>
        ))}
      </div>

      <div className="scroller" style={{padding:'0 16px'}}>
        {isDeload?(
          <div className="card" style={{padding:24,textAlign:'center',marginTop:8}}>
            <div style={{fontSize:40,marginBottom:12}}>🏖</div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Deload Week</div>
            <div style={{fontSize:13,color:'var(--t2)',lineHeight:1.75}}>No resistance training. Light cardio is fine.<br/>Recovery is where growth happens.</div>
          </div>
        ):(
          <>
            {dayData.exercises.map((ex,i)=>(
              <ExCard key={ex.name+i}
                exercise={ex}
                exSets={sets[ex.name]||[]}
                onUpdateSet={(si,f,v)=>updateSet(ex.name,si,f,v)}
                onCompleteSet={si=>completeSet(ex.name,si)}
                lastSession={getLastSession(ex.name)}
                stats={getExerciseStats(ex.name)}
                workoutStarted={started}
                expanded={!!expanded[i]}
                onToggle={()=>setExpanded(p=>({...p,[i]:!p[i]}))}/>
            ))}
            {started&&(
              <div className="card2" style={{padding:'14px 14px 12px',marginBottom:12}}>
                <div className="sec" style={{marginBottom:8}}>Session Notes</div>
                <textarea
                  value={sessionNote}
                  onChange={e=>setSessionNote(e.target.value)}
                  placeholder="How did this session feel? Note substitutions, pain points, cues, or wins."
                  style={{width:'100%',minHeight:94,resize:'vertical',background:'var(--s3)',border:'1px solid var(--bdr2)',borderRadius:12,color:'var(--t1)',padding:'12px 13px',fontSize:13,lineHeight:1.5,fontFamily:'inherit',outline:'none'}}
                />
              </div>
            )}
            <div style={{height:8}}/>
            {started&&optionalCount>0&&(
              <div style={{fontSize:12,color:'var(--t3)',paddingBottom:10}}>Optional exercises can be skipped and finished later.</div>
            )}
            {!started?(
              <button className="btn" onClick={()=>setStarted(true)}>Start Workout</button>
            ):(
              <button className={'btn'+(allComplete?' grn':'')} onClick={allComplete?finishWorkout:null} disabled={!allComplete}>
                {allComplete?'Finish Session ✓':'Complete All Sets to Finish'}
              </button>
            )}
            <div style={{height:24}}/>
          </>
        )}
      </div>

      {timer&&!timer.full&&timer.rem>0&&(
        <MiniTimer duration={timer.dur} remaining={timer.rem}
          onExpand={()=>setTimer(t=>t?{...t,full:true}:null)}
          onDismiss={()=>{clearInterval(timerRef.current);setTimer(null);}}/>
      )}
      {timer?.full&&(
        <TimerOverlay duration={timer.dur} label={timer.label}
          onDismiss={()=>{clearInterval(timerRef.current);setTimer(null);}}/>
      )}
    </div>
  );
}
Object.assign(window,{WorkoutScreen,ExCard,SetRow});
</script>

<!-- ─── Progress Screen ─── -->
<script type="text/babel">
function LineChart({data}){
  if(!data||data.length<2)return(
    <div style={{height:130,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--t3)',fontSize:13,gap:8}}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--t4)" strokeWidth="1.5" strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Log 2+ sessions to chart progress
    </div>
  );
  const W=340,H=140,pl=40,pb=28,pt=12,pr=12;
  const iW=W-pl-pr,iH=H-pt-pb;
  const ws=data.map(d=>d.metric||d.e1rm||d.weight);
  const mn=Math.min(...ws),mx=Math.max(...ws),range=mx-mn||1;
  const pts=data.map((d,i)=>({
    x:pl+(i/(data.length-1))*iW,
    y:pt+iH-(((d.metric||d.e1rm||d.weight)-mn)/range)*iH,
    label:d.label||d.date.slice(5),
    value:d.metric||d.e1rm||d.weight
  }));
  const pathD=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const areaD=pathD+' L'+pts[pts.length-1].x+','+(pt+iH)+' L'+pts[0].x+','+(pt+iH)+' Z';
  return(
    <svg viewBox={'0 0 '+W+' '+H} className="chart-svg">
      <defs>
        <linearGradient id="cg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#5aa8ff" stopOpacity=".24"/>
          <stop offset="100%" stopColor="#5aa8ff" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,.5,1].map((t,i)=>{
        const y=pt+iH-t*iH,v=Math.round(mn+t*range);
        return(
          <g key={i}>
            <line x1={pl} y1={y} x2={pl+iW} y2={y} stroke="var(--bdr2)" strokeWidth="1" strokeDasharray="3,3"/>
            <text x={pl-6} y={y+4} fill="var(--t3)" fontSize="9" textAnchor="end">{v}</text>
          </g>
        );
      })}
      <path d={areaD} fill="url(#cg1)"/>
      <path d={pathD} fill="none" stroke="var(--acc)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4.5" fill="var(--bg)" stroke="var(--acc)" strokeWidth="2.5"/>)}
      {pts.filter((_,i)=>i===0||i===pts.length-1||(pts.length>3&&i===Math.floor(pts.length/2))).map((p,i)=>(
        <text key={i} x={Math.max(24,Math.min(316,p.x))} y={H-5} fill="var(--t3)" fontSize="9" textAnchor="middle">{p.label}</text>
      ))}
    </svg>
  );
}

function VolumeChart({data}){
  const max=Math.max(...data,1);
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const todayDow=new Date().getDay();
  return(
    <div style={{display:'flex',gap:6,alignItems:'flex-end',height:80,padding:'0 4px'}}>
      {data.map((v,i)=>{
        const h=v>0?Math.max(8,Math.round((v/max)*64)):3;
        const isT=i===todayDow;
        return(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <div style={{width:'100%',borderRadius:4,height:h,minHeight:3,transition:'height .5s ease',
              background:isT?(v>0?'var(--acc)':'var(--acc-s)'):v>0?'var(--s4)':'var(--s3)'}}/>
            <div style={{fontSize:9,fontWeight:700,color:isT?'var(--acc)':'var(--t3)',textTransform:'uppercase',letterSpacing:'.03em'}}>{days[i]}</div>
          </div>
        );
      })}
    </div>
  );
}

function HistoryScreen({store}){
  const {sessions,getHistory,getExerciseStats,getWeeklyVolume}=store;
  const [sel,setSel]=useState('');
  const allEx=useMemo(()=>{
    const s=new Set();
    sessions.forEach(l=>l.exercises?.forEach(e=>{if(e.sets?.length)s.add(e.name);}));
    return[...s].sort();
  },[sessions]);
  const hist=sel?getHistory(sel):[];
  const stats=sel?getExerciseStats(sel):null;
  const weekVol=getWeeklyVolume();
  const totalVol=weekVol.reduce((a,v)=>a+v,0);
  const logDays=sessions;

  return(
    <div className="screen">
      <div style={{padding:'16px 16px 10px',flexShrink:0}}>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.5px'}}>Progress</div>
        <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>Track best sets, estimated 1RM, and session history</div>
      </div>
      <div className="scroller" style={{padding:'0 16px 20px'}}>
        <div className="card" style={{padding:16,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <div className="sec" style={{marginBottom:0}}>This Week's Volume</div>
            <div style={{fontSize:16,fontWeight:800,fontVariantNumeric:'tabular-nums',color:totalVol>0?'var(--t1)':'var(--t3)'}}>
              {totalVol>0?(totalVol>=1000?Math.round(totalVol/1000)+'k lbs':totalVol+' lbs'):'No sessions yet'}
            </div>
          </div>
          <VolumeChart data={weekVol}/>
        </div>

        <div className="card" style={{padding:16,marginBottom:12}}>
          <div className="sec">Exercise Progress</div>
          {allEx.length===0?(
            <div style={{fontSize:13,color:'var(--t2)'}}>Log workouts to track progress here.</div>
          ):(
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:sel?16:0}}>
              {allEx.map(n=>(
                <button key={n} className={'ex-chip'+(sel===n?' sel':'')} onClick={()=>setSel(sel===n?'':n)}>{n}</button>
              ))}
            </div>
          )}
          {sel&&(
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                <div style={{fontSize:14,fontWeight:700,flex:1,marginRight:8}}>{sel}</div>
                <div style={{display:'flex',gap:16}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:20,fontWeight:800,color:'var(--acc)',fontVariantNumeric:'tabular-nums'}}>{stats?.bestSetLabel||'—'}</div>
                    <div style={{fontSize:9,color:'var(--t3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>BEST SET</div>
                  </div>
                  <div style={{width:1,background:'var(--bdr)'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{stats?.metricValue||'—'}</div>
                    <div style={{fontSize:9,color:'var(--t3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>{stats?.metricLabel||'Metric'}</div>
                  </div>
                  <div style={{width:1,background:'var(--bdr)'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{stats?.sessionCount||hist.length}</div>
                    <div style={{fontSize:9,color:'var(--t3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>SESSIONS</div>
                  </div>
                </div>
              </div>
              <LineChart data={hist}/>
            </>
          )}
        </div>

        <div className="sec">Recent Sessions</div>
        {logDays.length===0?(
          <div className="card" style={{padding:20,textAlign:'center',color:'var(--t2)',fontSize:13}}>No sessions logged yet — Start Workout!</div>
        ):logDays.slice(0,10).map(log=>{
          const vol=log.volume||log.exercises?.reduce((a,ex)=>a+(ex.sets?.reduce((b,s)=>b+(s.weight||0)*(s.reps||0),0)||0),0)||0;
          const dm=log.duration?Math.floor(log.duration/60):null;
          const ds2=log.duration?log.duration%60:null;
          return(
            <div key={log.sessionId||`${log.date}-${log.sessionIndex||0}`} className="card" style={{padding:14,marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
                <div style={{fontWeight:700,fontSize:14}}>{log.dayName||'Workout'}</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  {dm!==null&&<div style={{fontSize:11,color:'var(--t2)'}}>{dm}:{ds2.toString().padStart(2,'0')}</div>}
                  <div style={{fontSize:11,color:'var(--t3)'}}>{log.date}</div>
                </div>
              </div>
              {vol>0&&<div style={{fontSize:11,color:'var(--acc)',fontWeight:700,marginBottom:5}}>{vol>=1000?Math.round(vol/1000)+'k':vol} lbs volume</div>}
              <div style={{fontSize:11,color:'var(--t2)',lineHeight:1.7}}>
                {log.exercises?.filter(e=>e.sets?.length>0).slice(0,3).map(e=>
                  e.name+' ('+e.sets.map(s=>(e.bodyweight&&!(parseFloat(s.weight)||0)?'BW':s.weight)+'x'+s.reps).join(', ')+')'
                ).join(' · ')}
                {(log.exercises?.filter(e=>e.sets?.length>0).length||0)>3&&' …'}
              </div>
              {log.notes&&<div style={{marginTop:6,fontSize:11,color:'var(--t2)',lineHeight:1.6}}>{log.notes}</div>}
              {log.prsHit?.length>0&&<div style={{marginTop:6,fontSize:11,color:'var(--acc)',fontWeight:700}}>🏆 PR: {log.prsHit.join(', ')}</div>}
            </div>
          );
        })}
        <div style={{height:16}}/>
      </div>
    </div>
  );
}
Object.assign(window,{HistoryScreen,LineChart,VolumeChart});
</script>

<script type="text/babel">
function ProgramScreen({store}){
  const {settings}=store;
  const [selPhase,setSelPhase]=useState(settings.currentPhase);
  const dp=WORKOUT_DATA.phases.find(p=>p.id===selPhase)||WORKOUT_DATA.phases[0];
  const dotColors=['var(--acc)','#82beff','#a9d4ff','var(--grn)','#f5db92'];

  return(
    <div className="screen">
      <div style={{padding:'16px 16px 10px',flexShrink:0}}>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.5px'}}>Program</div>
        <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>BLS Year One · 5-Day · 6 Phases</div>
      </div>
      <div className="scroller" style={{padding:'0 16px 20px'}}>
        <div style={{display:'flex',gap:6,marginBottom:14,overflowX:'auto',paddingBottom:2}}>
          {WORKOUT_DATA.phases.map(p=>(
            <button key={p.id} className={'prog-tab'+(selPhase===p.id?' sel':'')} onClick={()=>setSelPhase(p.id)}>{p.label}</button>
          ))}
        </div>

        <div className="card2" style={{padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,letterSpacing:'-.2px'}}>{dp.label} · {dp.weekRange}</div>
            <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>8 weeks training + 1 deload week · home gym optimized</div>
          </div>
          {selPhase===settings.currentPhase&&<span className="pill p-acc">Current</span>}
        </div>

        {dp.days.map((day,di)=>(
          <div key={di} className="card" style={{marginBottom:10,overflow:'hidden'}}>
            <div style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid var(--bdr)'}}>
              <div style={{width:36,height:36,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:dotColors[di],background:dotColors[di]+'20',flexShrink:0}}>{day.dayNum}</div>
              <div>
                <div style={{fontWeight:700,fontSize:14,letterSpacing:'-.2px'}}>Day {day.dayNum} — {day.name}</div>
                <div style={{fontSize:11,color:'var(--t2)',marginTop:1}}>{day.exercises.filter(e=>!e.isAbs).length} exercises · {day.exercises.filter(e=>!e.isAbs).reduce((a,e)=>a+e.sets,0)} sets</div>
              </div>
            </div>
            <div style={{padding:'6px 14px 10px'}}>
              {day.exercises.map((ex,ei)=>(
                <div key={ei} style={{display:'flex',alignItems:'center',padding:'8px 0',borderBottom:ei<day.exercises.length-1?'1px solid var(--bdr)':'none',gap:8}}>
                  <div style={{flex:1,fontSize:13,color:ex.optional?'var(--t3)':'var(--t1)',fontWeight:ex.warmup?600:400}}>{ex.name}{ex.optional?' (opt)':''}</div>
                  {!ex.isAbs&&<div style={{fontSize:11,color:'var(--t3)',fontWeight:700,flexShrink:0}}>{ex.warmup?'★ ':''}{ex.sets}x{ex.repRange}</div>}
                </div>
              ))}
            </div>
          </div>
        ))}

        <div className="sec" style={{marginTop:8}}>Training Rules</div>
        <div className="card" style={{overflow:'hidden',marginBottom:20}}>
          {[
            ['Rep Ranges','Heavy: 4–6 reps at ~85% 1RM · Accessory: 8–10 reps'],
            ['Equipment','Rack, bench, barbell, pull-up bar, adjustable dumbbells, and cable station'],
            ['Rest (primary)','3–4 minutes between heavy barbell sets'],
            ['Rest (accessory)','90–120 sec on dumbbells, cables, and assistance work'],
            ['Progression','Add 10 lbs when you hit top of rep range'],
            ['Tempo','2 sec down · 1 sec pause · 1–2 sec up'],
            ['Strength Wk','Every 4th week — same weights, fewer sets'],
            ['Deload','Week 9 of each phase — no resistance training'],
          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',padding:'11px 14px',borderBottom:'1px solid var(--bdr)',gap:12,alignItems:'flex-start'}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--t2)',width:106,flexShrink:0}}>{k}</div>
              <div style={{fontSize:12,color:'var(--t1)',lineHeight:1.55,flex:1}}>{v}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
Object.assign(window,{ProgramScreen});
</script>

function CrossfitScreen(){

  const updateLog=(day,patch)=>{
    setLogs(prev=>({...prev,[day]:{...(prev[day]||{}),...patch}}));

  return(
    <div className="screen">

            This week is now stored inside the app so you can track completion, score, and notes here. Use <span style={{color:'var(--acc)',fontWeight:700}}>Open Site</span> any time you want to compare against the live member page.

        </div>

          <div className="sec">Week Snapshot</div>

                  <div style={{fontSize:11,color:'var(--t3)',marginTop:2,textTransform:'uppercase',letterSpacing:'.06em'}}>{day.section}</div>

<script type="text/babel">

  useEffect(()=>S.set('bf5_sc',screen),[screen]);
  return(
    <>
      {screen==='home'    &&<HomeScreen store={store} setScreen={setScreen}/>}
      {screen==='today'   &&<WorkoutScreen store={store}/>}
      {screen==='history' &&<HistoryScreen store={store}/>}
      {screen==='crossfit'&&<CrossfitScreen/>}
      {screen==='plan'    &&<ProgramScreen store={store}/>}
      <BottomNav screen={screen} setScreen={setScreen}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
